name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx vitest run
      - run: npm run build
      # dist/ frais (#200) : le build est commité (option A). Si le bundle produit
      # diffère du dist/ commité, le src a changé sans rebuild → on bloque.
      # --porcelain attrape aussi les assets hashés nouveaux/supprimés, pas que les modifiés.
      - run: |
          if [ -n "$(git status --porcelain dist)" ]; then
            echo "::error::dist/ périmé — lancez 'npm run build' et commitez dist/."
            git status --porcelain dist
            exit 1
          fi
