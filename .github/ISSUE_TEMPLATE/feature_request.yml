name: Feature request
description: Suggest a capability or an enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Roadmapped stays small on purpose. The best feature is often the one we don't build — so tell us the *problem* first, not just the solution.
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you actually trying to do? What's frustrating today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: What you'd like
      description: Your proposed solution — rough is fine.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered
      description: Workarounds, other tools, or why the obvious fix doesn't cut it.
  - type: checkboxes
    id: checks
    attributes:
      label: Before you file
      options:
        - label: I searched existing issues and discussions
          required: true
        - label: I understand a nontrivial feature needs a spec in `docs/specs/` before code (see CONTRIBUTING.md)
          required: true
