id: 431
title: "FlowAreaChart : ligne pointillée + légende à traits (pas couleurs) pour les thèmes monochromes"
status: done
tags:
  - ds
detail: >-
  Le graphe 'Created vs closed / day' (OverviewView, src/components/FlowAreaChart.tsx) distingue
  aujourd'hui ses 2 séries (Created=TextSoft, Closed=accent) uniquement par la couleur — sur un
  thème monochrome où les lignes se confondent visuellement (accent proche du gris, ou vision des
  couleurs limitée), les 2 courbes deviennent indiscernables. Demande Rémi : (1) une des deux lignes
  (probablement Created, la série neutre, à trancher) en pointillé (strokeDasharray) au lieu de
  plein ; (2) la légende (actuellement 2 pastilles de couleur ronde) doit montrer un ÉCHANTILLON DE
  TRAIT (un petit segment de ligne avec le même style — plein vs pointillé, même stroke-width)
  plutôt qu'un swatch de couleur, pour rester lisible même quand les couleurs se confondent.
