  touching this » (ticketsOfNode). Dégradation propre si graph.json absent (pointe vers /graphify
  .). CLI (scripts/task.mjs) : roadmapped kb neighborhood/search/node/doctor (doctor affiche
  869n/2214a/46comm + staleness vs HEAD). SKILL.md : bloc « Know what a task touches — before
  exploring blind » (consulter le voisinage KB avant de grep à l'aveugle ; crédit Graphify). Nouveau
  src/lib/kbQuery.ts (pur, testé, 6 tests) = couche de requête partagée MCP+CLI réutilisant
  buildKbLinkIndex + matchNodes (join PAS réimplémenté). MCP et CLI importent le TS via
  register-ts.mjs. Bug latent corrigé : imports extensionless dans kbLink.ts (crashait en load Node
  brut).
