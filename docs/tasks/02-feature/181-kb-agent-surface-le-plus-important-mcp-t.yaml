detail: >-
  Demande phare de Rémi : que les agents utilisent vraiment le knowledge graph. (1) MCP : ajouter
  des outils dans scripts/mcp-server.mjs (hook makeTools()/buildServer()) task-centrés qui apportent
  le liage Roadmapped que le MCP générique de Graphify n'a pas — ex. kb_neighborhood(taskId) (nœuds
  code/doc connectés via kbLink), kb_search(query) (nœuds par label), kb_node(id) (détail + tickets
  touching). Réutiliser src/server/kb.ts + src/lib/kbLink.ts via register-ts.mjs (pas
  réimplémenter). (2) SKILL : ajouter au SKILL.md une consigne courte et à forte valeur — avant de
  bosser une tâche, consulter son voisinage KB (via MCP/CLI) pour trouver le code/docs qu'elle
  touche. (3) CLI : `roadmapped kb <sub>` dans le CLI (scripts/task.mjs) — neighborhood <taskId>,
  search <query>, doctor (graphe présent/à jour). Documenter la division avec le MCP natif de
  Graphify (graphify.serve). Ne pas toucher à l'étape d'install (séparée). tsc + tests verts,
  réutiliser les patterns MCP/CLI existants.
