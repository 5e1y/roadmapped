outcome: >-
  Surface agent KB livrée (Fable) — les agents utilisent le graphe. MCP (scripts/mcp-server.mjs, 3
  outils task-centrés que le MCP générique de Graphify n'a pas) :
  kb_neighborhood{id:number}→code/docs qu'une tâche touche (direct + 1 saut, via kbLink
