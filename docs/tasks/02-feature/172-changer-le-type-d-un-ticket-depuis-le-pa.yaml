detail: >-
  Manque signalé par Rémi : le panneau édite tous les champs SAUF le type (= la section/dossier). Le
  type ne peut donc pas changer après création. Fix : (1) taskWrites : moveTask(tasksDir, id,
  newSection) sous lock — écrit le YAML dans docs/tasks/<newSection>/<filename> + supprime l'ancien
  via commitWrites (pattern deleteTask), gère le dossier-jumeau de sous-tâches, valide newSection ∈
  TYPES, no-op si même section. (2) api.ts : patchTask détecte body.type/section → moveTask (sinon
  updateTask comme avant). (3) UI TaskPanel : un Select des 9 types (titre du type courant dérivé de
  task.file) qui PATCH {type}. La température (base) suit automatiquement le nouveau type.
