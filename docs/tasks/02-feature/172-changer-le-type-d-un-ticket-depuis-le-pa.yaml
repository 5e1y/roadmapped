outcome: >-
  On peut changer le type d'un ticket depuis le panneau. Backend moveTask(id, newSection) sous lock
  : déplace le fichier vers docs/tasks/<newType>/ (write neuf + delete ancien via commitWrites,
  dossier-jumeau de sous-tâches compris), valide newSection ∈ 9 types, no-op si déjà dedans. API :
  patchTask route vers moveTask si body.type. UI : Select des 9 types dans le panneau (défaut = type
  courant). La base de température suit automatiquement le nouveau type.
