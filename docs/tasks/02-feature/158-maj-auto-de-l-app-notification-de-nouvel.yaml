  - date: "2026-07-09T10:28:26"
    author: claude
    text: >-
      MISMATCH distribution : l'update-notifier sonde le registre npm
      (registry.npmjs.org/roadmapped), mais la distribution réelle actuelle passe par GitHub
      (github:5e1y/roadmapped) — cf. README « nothing needs to be on npm ». Tant que le paquet n'est
      pas publié sur npm, la notif no-op silencieusement (404) : inoffensif mais DORMANT. Décision à
      trancher (Rémi) : (a) publication npm prévue → laisser tel quel, ça s'activera à la
      publication ; (b) distribution GitHub assumée → retarget la sonde sur GitHub (comparer le
      gitHead installé au dernier commit de main via api.github.com, ou les tags/releases). Reopen
      #207 pour (b).
    resolved: true
