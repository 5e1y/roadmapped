size: null
detail: >-
  Demande Rémi. Le paquet `roadmapped` est distribué via npm/npx ; rien ne prévient l'utilisateur
  qu'une version plus récente existe. Implémenter une NOTIFICATION (pas d'auto-install silencieuse —
  muter les deps de l'utilisateur sans consentement est dangereux). Au lancement du `dashboard` (et
  éventuellement du CLI), comparer la version installée (package.json du paquet) à la dernière
  publiée sur le registre npm ; si plus récente → afficher une ligne discrète « update available X →
  Y : npm install roadmapped@latest && npx roadmapped upgrade ». Contraintes : fetch natif du
  registre (https://registry.npmjs.org/roadmapped/latest), timeout court (~800ms), no-op TOTALEMENT
  silencieux si offline / paquet pas encore publié / réponse invalide. Mettre en cache le résultat
  (~1×/jour, fichier dans un dossier tmp/OS) pour ne pas ralentir chaque lancement ni spammer le
  registre. Décision : notify-only, jamais d'install auto. Spec à écrire :
  docs/specs/2026-07-09-auto-update.md.
