outcome: >-
  Retargeté sur GitHub (décision Rémi github-only). notifyIfOutdated(packageDir, hostRoot) : saute
  si packageDir/.git (clone dev/self-host) ; lit le SHA installé dans le package-lock de l'hôte
  (packages['node_modules/roadmapped'].resolved) ; compare au dernier commit de main via git
  ls-remote HEAD (cache 1×/jour, timeout 2s) ; notice 'a newer version is available on GitHub (X →
  Y) : npm install github:5e1y/roadmapped && npx roadmapped upgrade'. Silence total sur erreur/lock
  absent/pnpm-yarn-bun. Appelé après résolution du hostRoot dans le case dashboard du bin. Spec mise
  à jour.
verification: >-
  Empirique : npm install github:5e1y/roadmapped réel → SHA seulement dans le package-lock de l'hôte
  (pas le package.json installé), d'où la lecture du lock. Chemins : install lockée sur HEAD distant
  → silence ; lock forcé sur commit ancien → notice « (5982339 → 5715898) » ; self-host (.git) →
  silence ; git ls-remote renvoie bien le HEAD distant (571589...). tsc 0 erreur, 399 tests verts
  (dont shaFromResolved).
