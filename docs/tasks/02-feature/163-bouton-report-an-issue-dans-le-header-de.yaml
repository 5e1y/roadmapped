  issue » qui ouvre https://github.com/5e1y/roadmapped/issues/new (idéalement avec le template bug
  pré-sélectionné : /issues/new?template=bug-report.yml). Dépend des issue templates (support) pour
  le lien exact. Rester dans le DS.
