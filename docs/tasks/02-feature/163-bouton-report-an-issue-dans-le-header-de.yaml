outcome: >-
  Bouton « Report an issue » ajouté au cluster droit de ViewHeader : lien externe icône-seule (Bug
  de Trinil, size 12) vers https://github.com/5e1y/roadmapped/issues/new?template=bug_report.yml (le
  form bug livré en #223), target _blank + rel noopener noreferrer, aria-label + title « Report an
