size: M
detail: >-
  PanelContext passe d'un id unique à une PILE : state stack: Array<{type:'task'|'section',
  id:number|string}> ; openTask(id) pousse (ou remplace si même id au sommet), back() dépile,
  close() vide tout ; exposer stack, top, back. SidePanel : bouton ← visible si stack.length > 1
  (aria-label « Retour »), Esc en cascade conforme à la spec §Comportements : popup Base UI ouvert →
  laisser Base UI le fermer (garde [role=listbox]/[role=dialog] existante à conserver) ; champ actif
  → blur (sauvegarde) ; sinon back() ; pile à 1 → close(). Focus : à l'ouverture focus sur le
  conteneur du panneau (tabIndex=-1, aria-label = titre de la tâche), à la fermeture restaurer le
  focus au déclencheur (mécanique existante à étendre à la pile : back() refocalise le panneau).
  Interface attendue par « panneau lecture » : usePanel() renvoie { openTask, openSection, back,
  close, stack }. Fini quand : ouvrir #2 → cliquer une dep → ← revient, Esc dépile puis ferme,
  vérifié dans le navigateur.
