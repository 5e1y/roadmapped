detail: >-
  Thème sombre pour toute l'app, basculable par un switch (Base UI) dans le header. Défaut =
  prefers-color-scheme, choix mémorisé (localStorage), appliqué via data-theme sur <html>. Levier :
  Tailwind v4 expose --color-* en variables CSS → les redéfinir sous :root[data-theme=dark] retourne
  l'app sans toucher les composants. Prérequis : tokeniser les hex en dur d'index.css (doc-prose
  #171717/#e5e5e5/#f5f5f5/#525252, focus #171717, scrollbar #737373, body #fafafa/#171717) + les
  strokes SVG en dur des glyphes (#737373). Spec design par Fable, dev par moi.
refs:
