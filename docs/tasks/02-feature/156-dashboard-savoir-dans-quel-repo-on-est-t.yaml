id: 204
title: >-
  Dashboard — savoir dans quel repo on est : titre header « Roadmapped ✕ repo » + /api/tree expose
  le repo hôte
status: done
tags:
  - dashboard
  - publish
detail: >-
  Prio Rémi. Plusieurs dashboards ouverts (repos différents) → on ne sait pas lequel on regarde. Fix
  : le titre du header (ViewHeader, haut gauche) affiche « Roadmapped ✕ NomDuRepo » — le ✕
  séparateur en graisse Light. PRIMITIVE PARTAGÉE : /api/tree renvoie déjà {ok,tree,errors} ; on y
  ajoute hostRoot + repoName (basename du hostRoot). Deux consommateurs : (1) ce header, (2) la
  sonde de collision du bin (#203). Pas de nouvel endpoint — on étend le payload existant que le
  client fetch déjà au montage. Backend : RoadmappedPaths gagne `root`, exposé par
  loadPaths/loadPathsAt/resolvePaths ; getTree renvoie hostRoot+repoName. Front : TreeContext expose
  repoName ; ViewHeader l'affiche ; document.title = `repo · vue · Roadmapped` (App.tsx) pour
  distinguer les onglets. Spec : docs/specs/2026-07-09-multi-repo-dashboard.md.
