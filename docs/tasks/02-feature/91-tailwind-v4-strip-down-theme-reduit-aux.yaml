outcome: >-
  @theme verrouillé : --color-*: initial désactive la palette Tailwind par défaut, seuls existent
  accent, accent-tint, white et neutral-50→900 (valeurs oklch v4 d'origine — zéro dérive de rendu) ;
  toute classe hors système ne génère plus aucun style (l'écart devient visible au lieu de
  silencieux). Zéro couleur arbitraire [#hex] dans src/components (purgées par #113-115, vérifié) ;
  pas de plugin/preset superflu (seul @tailwindcss/vite). Taille CSS dist inchangée : 26 576 octets
  avant/après — attendu, la purge v4 n'émettait déjà que l'utilisé ; le gain est l'enforcement, pas
  les octets
verification: >-
