title: Tailwind v4 strip down — @theme réduit aux tokens de design.md
status: done
tags:
  - design
  - tailwind
detail: >-
  Note de cadrage : Tailwind v4 purge DÉJÀ automatiquement les utilities non utilisées au build — le
  « strip down » utile n'est pas là. Le vrai travail : (1) réduire le @theme (CSS d'entrée) aux
  tokens de design.md (#111) — virer les couleurs/valeurs de la palette par défaut non utilisées
  pour que l'autocomplétion et le code ne proposent QUE le système ; (2) grep des classes
  arbitraires ([#hex], valeurs magiques) dans src/ → remplacer par les tokens ; (3) vérifier
  qu'aucun plugin/preset inutile ne traîne (package.json). Mesurer avant/après : taille du CSS de
  dist/ au build. Fini quand : @theme = design.md, zéro couleur en dur hors tokens dans
  src/components/, taille CSS consignée dans l'outcome, build vert.
