title: Panneau v2 — done guidé (mini-formulaire outcome)
status: done
tags:
  - panel
  - ux
size: M
detail: >-
  Bouton d'action de cycle de vie contextuel en tête de panneau (spec §2) : todo → « Démarrer »
  (PATCH status in_progress) ; in_progress → « Terminer… » ouvre un mini-formulaire inline
  (Collapsible Base UI) : outcome REQUIS (bouton Done désactivé si vide), vérification, commit,
  release optionnels → un seul PATCH {status:'done', outcome, verification, commit, release} ; done
  → « Archiver ». Verrou : le Select de statut (édition de la chip) ne propose PAS de transition
  directe vers done — choisir done ouvre le même mini-formulaire ; les retours en arrière
  (done→todo, rollback) restent directs. Fini quand : critère n°3 de la spec joué — terminer une
  tâche de test depuis l'UI exige l'outcome et le YAML relu sur disque contient status done +
  outcome + completedAt.
