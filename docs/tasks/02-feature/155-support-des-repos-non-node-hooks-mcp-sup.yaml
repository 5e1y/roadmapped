id: 201
title: "Support des repos NON-Node : hooks/MCP supposent package.json + node_modules/roadmapped"
status: done
tags:
  - publish
detail: >-
  Le flux d'install actuel exige un package.json hôte (npm install → node_modules/roadmapped) pour
  que le guard pre-commit, le hook SessionStart et l'entrée MCP résolvent. Un repo Python/Go/Rust
  n'a pas ça. Options : (a) fallback 'npx --yes github:5e1y/roadmapped <cmd>' dans les hooks (plus
  lent, mais sans node_modules) ; (b) installer un mini-launcher autonome ; (c) documenter comme
  limite Node-only pour v1. À trancher.
