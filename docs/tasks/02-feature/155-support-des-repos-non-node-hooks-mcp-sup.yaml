commit: 82e2dd3
outcome: >-
  Tranché avec Rémi (option c) : Roadmapped est Node-only pour v1, on le documente au lieu de
  l'implémenter. README : bloc « Requirements » explicite (Node ≥ 22.18 + package.json hôte, car
  install en devDep → hooks+MCP résolvent via node_modules/roadmapped/) + escape hatch pour repo
  non-Node (Python/Go/Rust) : `npm init -y` d'un package.json minimal, ou suivi depuis un repo Node
  voisin. setup.md du skill (lu par l'agent à l'install) : même note en §0. Support non-Node de
  première classe (fallback npx = option a, ou launcher autonome = option b) explicitement marqué «
  roadmap, pas v1 » aux deux endroits. Aucun code : YAGNI, zéro utilisateur non-Node avéré avant
  launch.
verification: >-
  README.md relu (bloc Requirements + non-Node sous la section install) ; setup.md §0 relu (note
  prérequis avant « host root »). Cohérent avec la garde Node ≥ 22.18 déjà présente dans
  bin/roadmapped.mjs (échec clair si Node trop vieux).
