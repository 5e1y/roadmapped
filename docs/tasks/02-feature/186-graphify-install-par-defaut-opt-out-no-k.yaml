outcome: >-
  Graphify installé par DÉFAUT (reverse #322). ensureGraphify installe SANS prompt (informe, ~28Mo
  one-time) ; opt-OUT via --no-kb (bin, ancien --with-kb inerte) → kb:false persisté en config
  (jamais re-tenté) ; skip silencieux si process.env.CI. Chaîne uv-first : uv PATH (résolu absolu)
  ou bootstrappé → uv tool install graphifyy (CPython géré téléchargé par uv si absent) ; uv absent
  → bootstrap depuis asset GitHub Release ÉPINGLÉ 0.11.28 (matrice darwin/linux/win × arm64/x64,
  download fetch, checksum sha256 vérifié, extraction tar, binaire → ~/.roadmapped/bin/uv, PAS de
  curl|sh) ; sinon pipx ; sinon venv ~/.roadmapped/py (seul étage exigeant Python≥3.10 système).
  Chemins absolus en config kb.{uvBin,pythonBin,graphifyBin}, statut installed/failed mémorisé. Sans
  extra Leiden. graphify install + claude install best-effort. MCP NATIF graphify enregistré dans
  .mcp.json (command=kb.pythonBin, args=['-m','graphify.serve'] — invocateur vérifié dans graphifyy
  0.9.13, serve.py ; fallback console-script graphify-mcp) via mergeMcpServer générique, idempotent,
  UNIQUEMENT si installed/already (pas d'entrée morte sur failed). NON BLOQUANT (try/catch, tryExec,
  bootstrapUv cleanup finally, timeouts 30s/120-300s/180s, zéro exit ; init/upgrade loggent toujours
  done). paths.ts : RoadmappedConfig.kb (false | {status,uvBin,pythonBin,graphifyBin}), pythonBin
  top-level legacy. Écarts : declined porté par kb:false (pas un status) ; uv non résolvable absolu
  → 'uv' tel quel (marginal) ; extraction via tar système (fallback étage suivant).
verification: >-
  npx tsc --noEmit clean ; npx vitest run 598/598 (arbre combiné avec #325). Tests #324 :
