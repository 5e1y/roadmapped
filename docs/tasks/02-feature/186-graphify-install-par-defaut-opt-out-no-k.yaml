heat: 90
detail: >-
  Reverse #322 (défaut Non → défaut OUI). Suit docs/specs/graphify-anchoring.md Volet A + reco P1
  MCP natif. Dans scripts/install.mjs (ensureGraphify) + bin/roadmapped.mjs + src/lib/paths.ts : (1)
  DÉFAUT = installe sans prompt (on informe, on ne demande plus) ; opt-OUT via `--no-kb` (bin) +
  `kb:false` en config (refus mémorisé) ; skip silencieux si env CI. (2) Chaîne uv-first : uv
  présent → `uv tool install graphifyy` (uv télécharge un CPython géré si Python≥3.10 absent) ; uv
  absent → installer uv via asset GitHub Release ÉPINGLÉ + checksum dans ~/.roadmapped/bin (PAS de
  curl|sh) ; sinon pipx ; sinon venv système. Chemins absolus mémorisés en config
  (kb.uvBin/pythonBin/graphifyBin), jamais dépendant du PATH. Non bloquant si tout échoue (log +
  init réussit + upgrade re-tente). SANS extra Leiden. (3) Enregistrer AUSSI le MCP NATIF de
  graphify dans .mcp.json (via mergeMcpEntry ou équivalent) : entrée `graphify` → `python -m
  graphify.serve` (ou le bon invocateur avec pythonBin) — complémentaire des outils kb_*
  task-centrés (le natif = navigation libre query_graph/get_neighbors/shortest_path/god_nodes). Ne
  génère toujours PAS le graphe (acte d'agent). Cross-platform mac/linux/win. tsc + tests verts
  (adapter les tests #322 : défaut installe, --no-kb skip, CI skip, idempotence, fallbacks mockés —
  aucune install réelle en test).
