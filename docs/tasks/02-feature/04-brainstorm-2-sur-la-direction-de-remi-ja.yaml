detail: >-
  Suite de #228. Rémi a tranché une DIRECTION (à faire marcher/détailler, PAS à re-litiguer). Le
  modèle : UN SEUL AXE « type de tâche » qui remplace À LA FOIS l'axe stage ET l'axe team (fusion
  back-end ; les teams disparaissent, absorbées). Correction importante d'un malentendu : marketing
  / legal / communication / design / finance & sales sont des TYPES DE TÂCHE, PAS des teams — ex : «
  créer un logo » = type design (ou marketing), « créer des posts LinkedIn » = type communication.
  On assigne LE type qui colle à la nature de la tâche ; il n'y a PAS de croisement à deux axes (pas
  de « bug marketing »), un seul type par tâche. Liste proposée par Rémi : bug, feature, brainstorm,
  marketing, design, communication, legal, finance & sales. (1) La notion de TEMPS est écartée
  (flèche idea→mature dégage). (2) Les jalons/colonnes = ces types. (3) Les anciens stages («
  go-to-market », « launch the app public »…) deviennent des EPICS (regroupements transverses). (4)
  Nœud identifié par Rémi : ré-apparition du problème d'affichage des epics qui ont des tâches dans
  PLUSIEURS colonnes (types). Fable doit : finaliser/compléter la liste des types (MECE, minimale,
  couvre TOUT le travail — dev inclus via bug/feature ?), poser la règle de classement (nature
  dominante ; cas limites), le modèle de données (un champ remplaçant section+team ; dossiers
  docs/tasks/<type>/ ; MIGRATION des 211 tâches en mappant ancien stage+team → type), le NOUVEL
  ordre de `next` (le tri était stage-primaire — que devient-il ?), la refonte
  validate/skill/dashboard, la solution d'AFFICHAGE des epics multi-colonnes, et
  fixe-vs-configurable (garder le zéro-bikeshedding ?). Décision finale = Rémi. Réalisé par Fable 5.
