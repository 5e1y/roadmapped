detail: >-
  Ancrage côté skill (docs/specs/graphify-anchoring.md P1). Aujourd'hui SKILL.md a 1 bloc KB
  hors-cycle et la « Golden anti-token rule » DÉCOURAGE l'appel KB (elle travaille contre). À faire
  (~10 lignes nettes, sans bloat) : (1) intégrer « le graphe D'ABORD » DANS le cycle (avant de
  grep/lire à l'aveugle, consulter le voisinage KB — via take/brief qui l'embarquent #325, ou
  kb_neighborhood/kb search) ; (2) une ligne dans Forbidden (ex. « ❌ explorer la codebase à
  l'aveugle quand le graphe répond ») ; (3) AMENDER la Golden anti-token rule pour qu'elle
  n'interdise PAS l'appel KB (distinguer : ne pas RE-scanner le backlog à la main ≠ interroger le
  graphe, qui est justement l'économie de tokens) ; (4) setup.md + README : passage narratif «
  Knowledge base powered by Graphify = navigation par le graphe, ~70% de tokens d'exploration en
  moins » (honnête : tokens d'exploration, pas la session), + le fait que c'est installé par défaut.
  Cohérent avec les commandes réelles (kb_*/roadmapped kb). Ne pas casser le reste du skill. tsc
  clean (docs, trivial).
