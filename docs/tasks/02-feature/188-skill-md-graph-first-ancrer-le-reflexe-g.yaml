outcome: >-
  Skill ancré « graph-first » (docs/skill only, Fable). SKILL.md : le bloc KB exhortatif hors-cycle
  REMPLACÉ (pas empilé, ~+4 lignes nettes) par « Graph first — locating code is a graph query, not a
  grep » ; intégré DANS « The cycle » (take/brief embarquent le voisinage KB #325, le reste via
  kb_neighborhood/kb_search/kb_node ou roadmapped kb, pas de grep aveugle) ; ligne Forbidden (❌
  grep/read aveugle quand le graphe répond) ; « Golden anti-token rule » AMENDÉE — distingue
  explicitement ce qui reste interdit (recomputer la priorité / re-scanner le backlog à la main) de
  ce qui est ENCOURAGÉ (interroger le graphe KB = l'index avant la lecture brute = l'économie de
  tokens), donc elle ne se retourne plus contre la KB. setup.md étape 7 réécrite : install par
  défaut (log, ~30Mo/~85Mo, opt-out --no-kb, jamais bloquant), consentement UNIQUEMENT sur la
  génération (/graphify . coûte des tokens, demander 1×), refresh --update code-only gratuit. README
  : section « Knowledge base, powered by Graphify » (le visualiseur n'est pas le sujet, l'agent
  navigue par le graphe ; honnête « ~70% des tokens d'EXPLORATION, pas la session, l'agent lit ce
  qu'il édite » ; installé par défaut ; crédit MIT non dupliqué). Noms de commandes vérifiés contre
  mcp-server.mjs/task.mjs. MCP natif graphify volontairement non cité (son enregistrement #324 en
  cours).
