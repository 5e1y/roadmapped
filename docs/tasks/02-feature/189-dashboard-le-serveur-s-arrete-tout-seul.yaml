verification: >-
  3 tests serve.test.ts verts (dont le nouveau contrat onClientCountChange : connexion→1,
  fermeture→0), suite complète 599/599, tsc --noEmit propre. Vérif e2e RÉELLE (script node lançant
  le vrai bin/roadmapped.mjs dashboard --port 5907) : (1) serveur démarre et reste vivant, (2) reste
  vivant tant qu'une connexion SSE /api/events est ouverte, (3) à la fermeture de la connexion (=
  onglet), s'arrête tout seul après ~5s de grâce avec le log 'fenêtre fermée — arrêt du serveur
  (port libéré)'. Opt-in vérifié : le plugin dev Vite appelle createApiMiddleware sans opts → npm
  run dev jamais impacté.
