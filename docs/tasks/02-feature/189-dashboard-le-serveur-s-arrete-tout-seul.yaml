title: >-
  Dashboard : le serveur s'arrête tout seul à la fermeture de la fenêtre (plus de serveurs zombies
  pendant des jours)
status: done
tags:
  - dashboard
  - dx
  - server
size: S
detail: >-
  Problème : `roadmapped dashboard` lance un serveur node qui survit à la fermeture de l'onglet →
  des serveurs traînent des jours, sans moyen évident de les arrêter. Fix : auto-shutdown opt-in via
  le SSE existant (/api/events, clients:Set dans api.ts). createApiMiddleware gagne un callback
  onClientCountChange ; startDashboard (serve.ts) l'utilise pour armer un timer de grâce (~5s,
  survit au reload) quand le dernier onglet se ferme → process.exit(0). NE concerne PAS le plugin
  dev Vite (npm run dev, atelier de Rémi) qui appelle createApiMiddleware sans opts.
