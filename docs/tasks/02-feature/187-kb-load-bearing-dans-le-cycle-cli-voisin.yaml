detail: >-
  Cœur de l'ancrage (docs/specs/graphify-anchoring.md P0/P2) : rendre la KB LOAD-BEARING dans
  scripts/task.mjs (le CLI take/brief/sitrep/done/kb). Reco P0 = le levier n°1 : (1) take ET brief
  EMBARQUENT d'office le voisinage KB de la tâche (via kbQuery/kbLink : nœuds code/docs connectés
  aux refs, directs + 1 saut) — l'agent reçoit la carte SANS avoir à y penser, dégradation propre si
  graph absent. (2) sitrep : une ligne KB (graphe présent ? nb nœuds ? + STALENESS : périmé si ≥N
  commits depuis la génération / absent = « graphe pas encore généré, lance /graphify . ») — c'est
  le marqueur de 1re génération (sitrep est injecté à chaque SessionStart). (3) done : nudge « pense
  à /graphify . --update » si le graphe est périmé. (4) `roadmapped kb refresh` : régénération
  code-only via l'AST (0 token LLM) si faisable en appelant graphify, sinon rappelle la commande.
  (5) `kb doctor` : seuil de staleness + exit codes propres. Réutiliser kb.ts/kbLink/kbQuery via
  register-ts (pas réimplémenter). Ne pas régresser take/brief/sitrep/done existants (tests). tsc +
  tests verts.
