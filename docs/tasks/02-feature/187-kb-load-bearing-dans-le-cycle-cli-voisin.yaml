  /graphify . --update » ; `kb doctor` exit 3 (périmé), exit 0 avec --max-behind 100. Tous les tests
  take/brief/sitrep/done/next existants passent inchangés. Écarts : nudge « refs hors graphe » (spec
  B.3) hors périmètre ; nudge done CLI-only (MCP renvoie warnings noyau) ; kb refresh vérifié via
  branche instructions réelle + faux binaire (graphify pas installé sur la machine).
