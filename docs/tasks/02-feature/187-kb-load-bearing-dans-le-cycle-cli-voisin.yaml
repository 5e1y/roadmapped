outcome: >-
  KB load-bearing dans le cycle CLI (le levier n°1). take ET brief EMBARQUENT d'office le voisinage
  KB de la tâche : section « Knowledge base — what this task touches (from its refs) » avec directs
  (bornés 12, round-robin par source_file pour ne pas que les 40 symboles d'un fichier mangent les
  slots) + voisins 1 saut (bornés 8, par degré décroissant), chacun label [type] file:ligne ; via
  kbQuery.boundNeighborhood/briefNeighborhoodText + buildKbLinkIndex (pas de réimpl) ; refs sans
  nœud → section omise. sitrep : ligne KB (nb nœuds + staleness = built_at_commit du graphe vs HEAD
  via git rev-list --count, périmé ≥10 commits ; absent → « not generated yet → /graphify . » ; pas
  de git → freshness unknown). done : nudge stderr non bloquant si périmé. kb refresh → graphify
  update [--force] (AST code-only 0 token LLM, invocateur vérifié cli.py amont ; résolution
  kb.graphifyBin → graphify PATH → python -m graphify ; introuvable → imprime la commande, exit 0).
  kb doctor → --max-behind N (défaut 10) + exit codes 0 frais/inconnu, 1 illisible, 2 absent, 3
  périmé. Nouveaux modules purs kbStatus.ts (staleness+rendus) + kbCycle.ts (composition Node fs+git
  partagée CLI/MCP). render.ts briefText/sitrepText gagnent un param KB optionnel (rétro-compat).
  server/kb.ts expose builtAtCommit. MCP take/brief/sitrep héritent (makeTools +3e param HOST_ROOT).
  Opt-out (kb:false) → silence total. Dégradation propre si graphe absent (1 ligne, exit 0).
verification: >-
  npx tsc --noEmit clean ; npx vitest run 598/598 (41 fichiers ; nouveaux : kbStatus 13, kbQuery +6,
