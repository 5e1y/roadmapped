id: 37
title: Accent bleu sur le travail en cours (in_progress)
status: done
tags:
  - ux
  - design
detail: >-
  Second usage de l'accent (carte blanche design validée par Rémi) : le travail EN COURS doit
  attirer l'œil partout où il apparaît. Passer le glyphe in_progress (demi-cercle, glyphs.tsx) en
  couleur accent — il est utilisé par toutes les vues (Backlog, Colonnes, Graphe, panneau,
  relations), donc un seul changement rend chaque tâche démarrée repérable partout. Étendre avec
  parcimonie si pertinent (libellé « en cours » du panneau). NE PAS bleuir : done, available, les
  barres de progression, la nav — le bleu se dilue s'il est partout. Fini quand : une tâche
  in_progress se distingue immédiatement d'une todo dans chaque vue (captures comparées), token
  accent uniquement.
