detail: >-
  Reprend UpdateNotice (#211) : le popover affichait une commande à copier ; désormais le bouton
  FORCE l'update et relance le dashboard au clic. Serveur : route POST /api/update dans le
  middleware createApiMiddleware (à côté du SSE) — re-vérifie checkUpdate (null si à
  jour/self-host/offline → 409, protège le npm run dev de Rémi), répond {restarting:true}, puis
  restartWithUpdate(hostRoot) = spawn détaché 'npm install github:REPO && npx roadmapped upgrade &&
  npx roadmapped dashboard --no-open' (env ROADMAPPED_ROOT) et process.exit(0) pour libérer le port
  (le parent quitte AVANT que l'enfant rebinde ; l'install ne prend pas de port). Front
  (UpdateNotice.tsx) : bouton 'Update & restart' → POST → état updating → poll /api/tree (catch les
  erreurs pendant le downtime) jusqu'au retour du nouveau serveur → location.reload(). Downtime
  ~30s-2min assumé, overlay explicite. Nouveau helper restartWithUpdate dans updateNotifier.ts
  (voisin de runUpdate/autoUpdate #294). Suit #294 (auto-update en fond) : ici c'est le déclencheur
  MANUEL immédiat + restart.
