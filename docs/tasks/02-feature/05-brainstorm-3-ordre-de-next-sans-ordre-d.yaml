detail: >-
  Suite de #230. CONTRAINTE DURE de Rémi : AUCUN ordre dans/entre les epics — la proposition « ordre
  de _epics.yaml = priorité » (#230 §5) est REJETÉE. Les epics restent des regroupements NON
  ordonnés. Le champ team disparaissant, son slot back-end (champ validé, flag CLI, filtre, badge)
  se libère et peut être RÉUTILISÉ pour la valeur de priorité. Idées de Rémi pour le tri de next :
  (A) graphe — servir d'abord les tickets qui BLOQUENT le plus d'autres tickets et sont en DÉBUT de
  chaîne de dépendances, puis ancienneté (plus ancien → plus récent). Caveat de Rémi : exige une
  vraie rigueur dépendances/blocages, sinon dégénère en ordre chronologique. (B) « Température » :
  un SPECTRE continu (0–100,00, ~10 000 crans) au lieu de 5 paliers ; optionnel, à n'utiliser QUE
  pour faire ressortir un ticket ; granularité quasi infinie, peu de charge mentale, et indicateur
  FUN (« température » > « priorité »). (C) COMBINER : température = calcul algorithmique mêlant
  ancienneté + nombre de tickets bloqués par ce ticket + la valeur de température initiale (seed)
  posée à la main → dynamique, monte toute seule. Fable doit concevoir le tri de next DÉFINITIF
  honorant tout ça (probable synthèse : température calculée = seed optionnel + downstream-blocks
  (graphe) + âge, déterministe, tri primaire, tie-break id ; PAS d'ordre d'epic), avec la FORMULE
  exacte (poids, normalisation 0–100, stockée vs calculée vs hybride), la question du
  déterminisme/dépendance au temps (l'âge fait évoluer next), le risque d'hygiène des dépendances
  (A/C en dépendent), le modèle de données (réutiliser le slot team libéré, défaut « froid »), la
  cérémonie minimale (optionnel/épars), et l'affichage (indicateur fun MAIS DS monochrome + 1 accent
  à respecter). Réutiliser dependsOn/milestones (déjà l'ordre fin). Décision = Rémi. Fable 5,
  brainstorm.
