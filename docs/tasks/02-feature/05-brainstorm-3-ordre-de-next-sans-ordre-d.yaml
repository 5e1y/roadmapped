outcome: >-
  Doc docs/specs/2026-07-09-next-temperature-brainstorm.md finalisé (2 itérations Fable via
  SendMessage). Tri de next par TEMPÉRATURE, partition TROIS TIERS ÉGAUX (décision Rémi) :
  température = auto + base + seed, chaque terme ≤33,33. auto = min(33,33 ; 20·B + 13,33·A) [B =
  blocages transitifs aval, A = âge/(âge+90)] ; base = base-par-type (bug 30, business 20, legal 18,
  feature 14, design 12, brainstorm 10, marketing 7, communication 7, chore 5) ; seed = heat/3
  (champ heat stocké 0–100 dans le slot team libéré). 3 signaux à égalité, seed NON souverain
  (voulu). Hybride (seed stocké, température calculée à la lecture, cache WeakMap). Déterministe à
  date injectée (granularité jour, minuit UTC). AUCUN ordre d'epic. Migration nulle (absent=froid).
  Affichage monochrome (chip °, seuil ≥33,33). Décision finale = Rémi.
