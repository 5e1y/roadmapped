commit: 4ad705b
outcome: >-
  Ouverture auto via hook SessionStart. ensureSessionHook (scripts/install.mjs) merge idempotent
  dans .claude/settings.json de l'hôte un hook SessionStart qui lance `sitrep` (commande = node
  [--import amaro loader] <base>/task.mjs sitrep, adaptée self-host vs node_modules) — à l'ouverture
  d'une session Claude dans un repo Roadmapped, l'état du monde (done du jour, in_progress,
  prochaines, avancement, alertes) est injecté d'emblée dans le contexte, sans compter sur l'agent
  pour y penser. Câblé dans runInit ET runUpgrade (config tool-owned re-assertable). Merge préserve
  les autres hooks SessionStart et les réglages voisins (model…), repère notre entrée par « task.mjs
  sitrep » (pas de doublon au ré-init), settings.json illisible laissé intact. DÉCISION (ticket «
  trancher hook vs CLAUDE.md vs les deux ») : hook SEUL — mécanisme déterministe qui injecte le vrai
  état ; pas de doublon CLAUDE.md (le skill instruit déjà sitrep-first, ce serait de la prose
  redondante). Self-host dogfoodé : .claude/settings.json de CE repo porte désormais le hook.
verification: >-
  npx vitest run 346/346 (4 nouveaux ensureSessionHook : pose le hook, idempotent, préserve autres
  hooks+réglages, settings illisible sauté) ; tsc clean ; validate OK 131 tâches (non-régression).
  Dogfood réel : ensureSessionHook exécuté sur ce repo → .claude/settings.json créé avec le hook
  (vérifié cat). E2E hôte : runInit dans un sandbox pose bien SessionStart avec la commande
  node_modules + loader amaro. Le déclenchement effectif s'observera à ma prochaine session dans ce
  repo (le hook injecte le sitrep) — non observable dans la session courante (déjà démarrée avant le
  hook).
release: pre-release
