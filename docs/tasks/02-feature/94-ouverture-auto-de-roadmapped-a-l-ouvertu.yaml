detail: >-
  Quand une instance Claude démarre dans un repo où Roadmapped est installé (docs/tasks/_meta.yaml +
  roadmaped.config.json présents), déclencher automatiquement l'entrée en workflow — a minima un
  sitrep d'ouverture, idéalement via un hook SessionStart du skill/plugin. Trancher : hook plugin vs
  consigne dans CLAUDE.md vs les deux. Dépend du mécanisme d'install (#12) pour savoir où vit le
  hook. Découpe en spec possible si le mécanisme n'est pas évident.
