detail: >-
  Chaque champ du mode lecture devient éditable au clic (spec §1,3,4,5,6) : titre → input inline ;
  chips statut/size/zone/code → Select/inputs Base UI ; détail → textarea auto-grow (Cmd/Ctrl+Entrée
  ou blur sauvegarde) ; tags → chips avec suppression unitaire + input d'ajout (plus de CSV) ;
  Dépend de/Liens → MultiCombobox au clic sur ✎ ; refs → textarea une-ref-par-ligne ; consignation →
  éditable au clic. Feedback : ✓ fugace SUR le champ sauvé (pas global), erreur de validation SOUS
  le champ fautif avec saisie conservée (reprendre le suivi par champ existant), Toast Base UI
  global pour les erreurs réseau/rollback uniquement. Esc pendant une édition = blur+save (déjà géré
  par la tâche pile). Boutons d'action avec état busy conservés. Fini quand : critère de fini n°4 et
  5 de la spec joués dans le navigateur (erreur de validation visible sous le champ, serveur coupé →
  toast, Esc ne perd rien).
