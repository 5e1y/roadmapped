commit: ed830ea
outcome: >-
  La démo iframe suit le thème du site. App (commit df60c8f) : index.demo.html lit ?theme=dark|light
  du parent (script anti-flash) → data-theme sur la démo, sinon prefers-color-scheme. Site (commit
  ed830ea) : l'iframe charge avec demo/?theme=<courant> (pas de flash au bon thème d'emblée) et se
  met à jour en LIVE au toggle via contentDocument.data-theme (même origine), + listener load pour
  couvrir le lazy-load. Démo rebuildée avec le script embarqué.
verification: >-
  Build démo OK, script thème présent dans site/demo/index.html (vérifié). Câblage toggle→iframe en
  place. Rendu live (bascule réelle de l'iframe) à valider en preview.
