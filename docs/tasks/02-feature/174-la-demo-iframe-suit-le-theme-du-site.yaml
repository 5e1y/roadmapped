id: 282
title: La démo iframe suit le thème du site
status: done
tags: []
detail: >-
  Quand le site bascule clair/sombre, l'iframe démo (/demo/, même origine) bascule aussi. Site :
  passe le thème à l'iframe (query ?theme= au chargement + mise à jour au toggle via
  data-theme/postMessage). App : index.demo.html lit ce thème (script anti-flash miroir de l'app) et
  pose data-theme sur son html. Dépend du rebuild démo (#281). Repos app (index.demo.html) + site.
  Voir spec D8.
