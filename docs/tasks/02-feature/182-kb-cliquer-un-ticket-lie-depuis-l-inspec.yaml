outcome: >-
  Double panneau nœud+ticket dans la KB (Fable, relu). Cliquer un ticket depuis l'inspecteur de nœud
  (KbNodePanel « Tickets touching this ») ouvre le TaskPanel à DROITE en gardant le nœud à GAUCHE —
  plus d'empilement/remplacement. Détection : isDualStack(stack) pur = pile ≥2 && sommet task &&
  cran dessous kb-node (aucun état ajouté, lecture de la pile). PanelHost rend un fragment de 2
  SidePanel (nœud key=panel gauche, ticket key=panel-task droite), 380px chacun, filet gauche,
  tokens theme-aware. SidePanel REFACTORÉ en 100% props (title, focusKey, onClose, onBack?,
  onEscape?, primary?) — plus aucun usePanel → 2 instances coexistent sans se marcher dessus ; le
  primaire (ticket de droite) capte focus+Esc. Close/back : ✕/←/Esc du ticket = back (dépile → nœud
  seul) ; ✕ du nœud en double = close() (ferme tout) ; cliquer un autre ticket en double = pushEntry
  remplace le sommet (no-op si même ticket), nœud préservé. Flux simples (task
  Backlog/section/create-task/kb-node seul) strictement inchangés (mêmes valeurs passées que ce que
  SidePanel dérivait, key stable = même persistance d'instance). PanelContext.test.ts (8 tests purs
  isDualStack/pushEntry).
