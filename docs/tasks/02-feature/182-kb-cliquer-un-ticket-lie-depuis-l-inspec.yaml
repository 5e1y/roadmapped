detail: >-
  Retour Rémi. Aujourd'hui, depuis l'inspecteur d'un nœud (KbNodePanel « Tickets touching this »),
  cliquer un ticket fait openTask = EMPILE et remplace le nœud (flèche retour). Rémi veut :
  nœud→ticket = DEUX panneaux côte à côte, nœud à GAUCHE, ticket à DROITE. Layout : PanelHost est
  flex-sibling après <main> ; rendre 2 SidePanel (nœud puis ticket) = 2 colonnes droites,
  nœud=gauche, ticket=droite. Mécanique : quand la pile = [kb-node, task] (task ouvert DEPUIS un
  kb-node), PanelHost rend les DEUX. Sémantique close/back : le ✕/Esc/back du panneau TICKET
  (droite) dépile le task → revient au nœud seul ; le ✕ du panneau NŒUD (gauche) ferme tout ;
  cliquer un AUTRE ticket en mode double remplace le task de droite (nœud reste). ATTENTION :
  SidePanel lit top/stack/back du contexte (focus, Esc cascade) → refactor prudent pour que 2
  instances coexistent (props explicites plutôt que dépendre de `top`). Ne PAS régresser les flux
  simples (task depuis Backlog, section, create-task, kb-node seul). 380px, filets, DA, theme-aware.
  tsc + tests verts. Ne pas toucher serveur/schéma/install.
