detail: >-
  Phase 2 de docs/specs/graphify-kb.md, sur le slice 1 (#304). Toujours SANS toucher install/Python.
  (1) Inspecteur de nœud dans le SidePanel au clic sur un nœud du KbGraph : label, fichier,
  communauté, rationale, ET « Tickets touching this » (réutilise ticketsOfNode de kbLink) → clic
  ticket = openTask ; (2) recherche client dans le header KB (filtre/surbrillance des nœuds par
  label + fit sur résultats) ; (3) filtres FilterMenu : communauté, file_type, masquer les arêtes
  INFERRED/AMBIGUOUS (la communauté n'est aujourd'hui que dans stats — l'exposer en filtre, pas en
  couleur, DA respectée) ; (4) watch live SSE sur graph.json + chip de staleness (regarde comment
  docs/live activity gèrent le SSE existant) ; (5) cache KB partagé — useKbGraph refait un fetch par
  montage de TaskPanel aujourd'hui, dédupliquer (store module-level ou contexte, comme les autres
  états partagés). tsc clean + vitest vert, réutiliser les patterns existants (SidePanel,
  FilterMenu, useZoomPan, le SSE live). Ne pas régresser slice 1.
