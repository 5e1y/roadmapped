detail: >-
  Dernière phase de docs/specs/graphify-kb.md. Nouveau step ensureGraphify(hostRoot, {tty, withKb},
  log) dans scripts/install.mjs (même moule que ensureConfig/copySkill/…, testable), appelé dans
  runInit APRÈS le wiring, et re-tenté par runUpgrade (sans destruction). Comportement : (1) détecte
  python3 ≥ 3.10 — absent/trop vieux → log clair (« KB optionnelle : installe Python ≥3.10 pour
  l'activer ») + return, l'init CONTINUE et REUSSIT (JAMAIS bloquant) ; (2) skip si graphify déjà
  dispo (idempotent) ; (3) CONSENTEMENT : l'install (~28 Mo) n'est faite QUE sur accord — prompt TTY
  oui/non ; en NON-TTY/CI → SKIP par défaut avec message, opt-in via flag `--with-kb` (parser dans
  le bin, passer à runInit) ; (4) install graphifyy dans un ENV ISOLÉ, le plus léger : uv tool
  install → sinon pipx → sinon venv dédié (pythonBin en config si venv), SANS l'extra
  Leiden/graspologic (fallback python-louvain, cf verdict spec) ; (5) `graphify install` (+
  `graphify claude install` si dispo) ; (6) NE génère PAS le graphe (la génération est orchestrée
  par l'AGENT via le skill, pas par install.mjs qui n'a pas d'agent) → log « pour générer :
  /graphify . » ; (7) NE gitignore PAS graphify-out/ (décision Rémi : on commite le graphe) — au
  plus mentionner. Marche pour les 3 voies d'install (plugin/npm/github). MAJ references/setup.md :
  ajouter à la phase setup l'étape KB (proposer d'activer Graphify + générer, avec consentement).
  Tests install.test.mjs : python absent → skip propre + init réussit ; non-TTY sans --with-kb →
  skip ; idempotence. tsc + tests verts. Ne pas casser les steps existants.
