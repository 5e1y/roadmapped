detail: >-
  Documenter la limite assumée du verrou (spec §Limite) : le verrou ne garantit rien INTER-branches
  — deux worktrees peuvent allouer le même id, révélé au merge de _meta.yaml (validation refuse
  l'arbre fusionné). Doctrine (2 lignes dans references/delegation.md) : le multi-agent concurrent
  partage UN arbre de travail (le verrou les sérialise) ; les worktrees restent des chantiers isolés
  qui mergent leurs tickets comme du code, conflits d'ids compris. Fini quand : 2 lignes ajoutées à
  delegation.md, cohérentes avec le comportement livré du verrou.
