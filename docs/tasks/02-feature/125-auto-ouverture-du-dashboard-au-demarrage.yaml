  instance sur 5173, 2e appel node bin/roadmapped.mjs dashboard → « déjà ouvert →
  http://localhost:5173/ » exit 0 sans relancer. E2E : runInit dans un hôte vierge écrit CLAUDE.md
  contenant « npx roadmapped dashboard ».
