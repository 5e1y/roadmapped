outcome: >-
  Auto-ouverture du dashboard au démarrage de session. (1) Verbe dashboard IDEMPOTENT
  (bin/roadmapped.mjs) : avant de spawn vite, sonde GET http://localhost:5173/api/tree (timeout
  500ms) ; si la réponse a la forme {ok:…} (= NOTRE dashboard) → « déjà ouvert → URL » + exit 0, pas
  de 2e instance. Un autre serveur sur le port (projet de l'hôte) ne matche pas → vite démarre
  normalement (et auto-incrémente). Plafond assumé (ponytail) : sonde 5173 seul. (2) init + upgrade
  écrivent un bloc roadmapped dans CLAUDE.md de l'hôte (ensureClaudeMd, marqueurs <!-- >>>
  roadmapped >>> -->, idempotent + NON destructif comme installGuardHook — préserve le CLAUDE.md
  existant) : consigne « au démarrage de session, si le dashboard n'est pas déjà ouvert, lance npx
  roadmapped dashboard (idempotent) ». L'agent ouvre donc le dashboard une fois par session, sans
  jamais empiler d'instances. Morceau concret de #121 (init riche CLAUDE.md).
verification: >-
  Suite complète 381/381 (install.test 28, +3 ensureClaudeMd : création, idempotence, préservation
