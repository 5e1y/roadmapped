detail: >-
  Demande Rémi. Exposer les paramètres de la sim de forces (kbSim : force de charge/répulsion,
  distance des ressorts/lien, centrage, θ Barnes-Hut, friction, alpha decay, taille des nœuds,
  distance max… + éventuellement seuils de groupage/communauté) dans un PANNEAU DE RÉGLAGES
  d'affichage accessible depuis la vue KB. But immédiat : DEV — Rémi tune en live pour trouver les
  bons paramètres (il les renverra, je les mettrai par défaut). But durable : le panneau RESTE dans
  l'app pour que les users customisent leur graphe. Sliders/inputs live (la sim se réchauffe et
  applique à chaud). PERSISTANCE : sauver les derniers réglages côté user en localStorage (comme les
  autres prefs UI, ex. ui:theme) → survivent reload + fermeture du dashboard ; bouton « reset
  defaults ». Ne pas casser reduced-motion. Base UI, DA, theme-aware. tsc + tests verts. kbSim doit
  accepter des params injectés (defaults centralisés, overridables).
