outcome: >-
  Panneau de réglages d'affichage du graphe KB + persistance (Fable). Refactor : KB_SIM devient des
  defaults typés (KbSimParams) ; createKbSim(input, params?) fusionne defaults + override partiel
  (resolveKbSimParams) ; sim.setParams() ré-applique à chaud (re-dérive rayons/charges/ressorts,
  positions/vélocités intactes). Panneau KbDisplayMenu.tsx : bouton pill « Display » (icône
  SlidersHorizontal) dans la toolbar KbView (Popover Base UI, idiome FilterMenu), 8 sliders + valeur
  mono, live : Spring length (LINK_DIST), Repulsion (CHARGE_BASE), Centering (CENTER_K), Friction
  (1−VELOCITY_KEEP), Settle time en ticks (↔ALPHA_DECAY), Theta (Barnes-Hut), Node radius min/max.
  Live-apply : slider → store → driver.applyParams → setParams + kick(0.45) + relance rAF (vérifié :
  LINK_DIST 55→120 réorganise). Persistance : store dédié src/state/kbSimParams.ts, clé localStorage
  ui:kb-graph-params, seul le DIFF vs défauts stocké (valeur remise au défaut disparaît),
  sanitize+clamp (KB_SIM_LIMITS) au boot, défensif mode privé ; bouton Reset defaults efface la clé.
  Tint accent quand des réglages custom sont actifs. 100% tokens, theme-aware. But : Rémi tune en
  live → renvoie les valeurs → je les fige comme défauts ; panneau conservé pour les users. Écart
  assumé : sous reduced-motion (layout statique) les sliders sont sans effet.
verification: >-
  npx tsc --noEmit clean ; npx vitest run 543/543 (dont fusion defaults+override, sanitize,
  orderByDegree, stagger driver). CDP : slider LINK_DIST 55→120 → localStorage {"LINK_DIST":120} +
  réorganisation ; Reset → stored null ; theme dark OK. Non-régression KB vérifiée
  (survol/clic+zoom/filtre-morph/recherche/drag/arêtes inferred/carte). Workflow tuning à dérouler
  par Rémi : ouvrir Display, régler, me renvoyer les valeurs.
