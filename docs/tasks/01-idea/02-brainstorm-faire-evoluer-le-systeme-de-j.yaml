detail: >-
  Hésitation Rémi. Les 8 stages fixes immuables (01-idea → 08-mature) modélisent un LAUNCH produit
  (0→1) : parfait pour aller de l'idée à la maturité. MAIS une fois le produit lancé (cas actuel),
  le travail continu (features, bugs, maintenance, itérations, croissance) s'entasse tout dans
  04-build → une seule colonne obèse, et la métaphore linéaire ne dit plus rien. Objectif :
  BRAINSTORM (pas d'implémentation) sur comment faire vivre le modèle de jalons AUSSI pour le
  travail continu post-launch, sans casser ce qui marche pour la phase de launch. Livrable = doc
  d'options (docs/specs) avec tradeoffs + reco. Contrainte forte à empoigner : aujourd'hui le skill
  INTERDIT une 9e stage / le renommage, et validate.ts fige l'enum ; toute piste doit composer avec
  ça (ou proposer d'assouplir la règle, en connaissance de cause). Décision finale = Rémi
  (changement de modèle cœur). Réalisé par une instance Fable 5 en brainstorm.
