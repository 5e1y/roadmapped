  Retour Rémi sur la KB. (1) RE-CENTRAGE : quand on filtre/cherche, le graphe filtré se recale en
  haut-gauche ; il doit rester CENTRÉ (auto-fit du sous-graphe visible via fitBox), le pan/grab
  restant possible après. Pas de re-stagger. (2) CLIC NŒUD : ouvre déjà l'inspecteur (garder) +
  AJOUTER un zoom à ~125% (au moins) centré sur le nœud cliqué, transition douce,
  reduced-motion=instant (étendre useZoomPan avec un centerOn(x,y,scale)). (3) FILTERMENU
  (src/components/ViewHeader.tsx — PARTAGÉ Backlog/EpicBand/RoadmapView/KB, améliorer partout sans
  régresser) : (a) trigger actif : remplacer le shadow-[inset_2px_0_0] (filet gauche qui jure avec
  rounded-md) par un bord accent COMPLET (border-accent bg-accent-tint, langage actif DS des pills
  type TagGraph/TypesRadar) ; (b) Popup : max-height bornée (~60vh) + overflow-y-auto (46
  communautés = ne doit pas faire toute la hauteur) ; (c) COCHES : ajouter une coche (Check
  trinil-react) à côté des options sélectionnées — le simple bg ne suffit pas en UX ; garder le
  count ; (d) polish général des boutons de filtre. tsc + vitest verts, theme-aware, tester sur le
  vrai graphe. Ne pas toucher serveur/schéma/install.
