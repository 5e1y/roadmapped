  visible : fill accent PLEIN (bleu plein), iso l'aperçu nodal des thèmes dans le Backlog (langage
  actif du DS). KbGraph doit connaître l'id sélectionné (PanelContext : top kb-node nodeId) et le
  peindre plein accent (+ éventuellement halo léger). Se met à jour au clic (le clic ouvre déjà le
  panel). Theme-aware, DA. tsc + tests verts, pas de régression.
