detail: >-
  Retouche Rémi (2026-07-07) : les noms de teams passaient par-dessus les lignes du radar
  (illisible). Remplacer les textes nus par de PETITES CARTES opaques aux 8 sommets : pastille
  blanche bordée (rx arrondi — élément interactif), icône trinil par métier (marketing=Megaphone,
  sales=Handshake, support=Headphones, operations=Gear, finance=Bank, legal=Hammer,
  engineering=Code, design=ColorPalette), nom + compteur ; rollover accent (bordure + encre), état
  sélectionné = tint accent + liseré ; opaques donc lisibles quel que soit le polygone derrière.
  Marges du viewBox ajustées. Fini quand : aucune ligne visible sous un label (capture), rollover
  constaté, clic carte = sélection, clic vide = désélection intacts.
