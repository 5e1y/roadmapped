id: 396
title: "Thème GitHub : ajuster les tokens au vrai github.com (delta réel)"
status: done
tags:
  - theming
detail: >-
  Comparer le bloc :root[data-theme-name="github"] (src/index.css) à l'UI réelle de github.com (repo
  page) et resserrer l'écart : accent, accent-tint, page/carte, neutral-200 (bordures), rayons,
  spacing-listgap. Contrainte stricte : n'agir QUE via les tokens sémantiques partagés du DS (les 9
  couleurs / 4 rayons / 6 spacing définis dans @theme) — pas de token ad hoc ni de CSS spécifique au
  thème hors de ce contrat. Si une feature du DS GitHub semble indispensable à l'ambiance (ex:
  header sombre distinct de la carte, tabs soulignés, badges) mais ne rentre pas dans le contrat de
  tokens actuel, PROPOSER (ne pas juste coder) une intégration strictement composant + token
  sémantique, à valider avant d'étendre le contrat.
refs:
  - src/components/NavRail.tsx
  - src/index.css
