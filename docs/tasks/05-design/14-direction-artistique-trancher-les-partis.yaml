outcome: >-
  Direction artistique tranchée par Rémi : ACCENT. La marque garde la ligne minimale existante —
  monochrome (échelle neutral oklch) + accent rare exprimé via le langage accent-tint
  (bg-accent-tint + filet accent pour l'état « actif », design.md §3.2). PAS de palette étendue, pas
  de nouveau style graphique. Conséquence appliquée immédiatement : #176 (toggle show-done) migré du
  gris-comme-état vers accent-tint. Cette décision cadre les futurs choix visuels (déclinaisons,
  site) : accent-led, sobre, anti-fioriture.
