outcome: >-
  Graphe de liens façon Obsidian pour les tags (Fable). tagGraph.ts pur : tagGraph(tasks,
  maxNodes=16) → nœuds = tags des tickets OUVERTS (todo+in_progress, sous-tâches comprises), count =
  nb de tickets, arêtes = co-occurrence sur un même ticket (poids ∝ nb), tri déterministe ; +
  layoutTagGraph() force-directed MAISON déterministe (cercle initial + 260 itérations
  répulsion/ressorts/gravité/refroidissement, normalisé 120×100, zéro dep zéro aléa → testable).
  TagGraph.tsx : SVG aria-hidden (arêtes accent atténué ∝ co-occurrence, surlignées si touchent le
  tag actif ; pastilles ∝ √count, plein accent réservé à la sélection — doctrine rareté) + labels
  boutons aria-pressed (gabarit TeamsRadar), chip « retirer » pour un filtre fantôme. useTagFilter
  (filters.ts, clé filter:tags, symétrique useTeamFilter) ; matches() Backlog inclut le tag ;
  re-clic = désélection ; team+tag = ET logique (qui × quoi). Placement : flanc droit 420px, radar
  Teams au-dessus + filet + tag-graph dessous, flanc en flex-col overflow-y-auto (scroll interne,
  pas de clip ni position:absolute orphelin — leçon #141). Plafond 16 tags (TAG_GRAPH_MAX_NODES).
