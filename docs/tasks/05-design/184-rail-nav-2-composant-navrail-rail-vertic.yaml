detail: >-
  Spec docs/specs/2026-07-19-rail-navigation.md (ticket 2). Dépend du ticket 1 (les 6 vues doivent
  exister). Composant NavRail : bande verticale gauche ~64px, fond neutre bord droit fin, mascotte
  pixel en tête, 6 items empilés (icône + label court), actif = accent (doctrine monochrome + accent
  rare, tokens --color-accent/--color-accent-tint), séparateurs fins pour grouper. Remplace le <nav>
  segmenté de ViewHeader ; le header garde titre repo×marque + contrôles propres à la vue (cluster
  droit Activity). A11y : <nav> + aria-current, focus visibles, cibles ≥40px, jamais d'icône seule
  sans texte. 6 icônes line monochromes dans src/components/glyphs.tsx (pas de lib tierce). Layout :
  le rail est un flanc gauche du Shell (App.tsx), la vue prend le reste. Vérifier rendu
  clair/sombre, tsc/vitest/build.
