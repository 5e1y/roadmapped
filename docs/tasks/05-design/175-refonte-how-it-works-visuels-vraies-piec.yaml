outcome: >-
  Ajustements post-review Rémi sur la refonte How-it-works (Fable 5, relu + déployé). (1) CONTEXTE
  D'APP : chaque pièce extraite est désormais encadrée d'un chrome de dashboard .ui-frame — barre
  d'onglets Backlog/Roadmap/Docs (onglet actif contextualisé par pièce : Backlog pour 01-03, Roadmap
  pour 04) + pastille Activity (allumée sur le visuel 02) + rail de sidebar estompé, la pièce au
