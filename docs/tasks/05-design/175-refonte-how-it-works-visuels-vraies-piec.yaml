outcome: >-
  Refonte complète de #how-it-works du site (Fable 5, relu + vérifié + déployé). (1) VISUELS : les 4
  mockups ASCII remplacés par des pièces ISOLÉES de la vraie UI de l'app, reproduites en HTML/CSS
  statique sur les variables du site (theme-aware, mapping tokens app→site documenté dans le CSS, 0
  couleur en dur, SVG en currentColor/var) — 01 backlog TaskRow (glyphe d'état, #id, thermomètre «
  41,3° », chip size), 02 popup LiveActivity, 03 TaskPanel done (bloc Log
  outcome/verification/commit), 04 colonnes RoadmapColumns (barre de progression accent, cartes à
  filets fusionnés). Famille de classes .ui-*. (2) INTERACTION : pin-scroll 100vh entièrement
  supprimé (.how-scroll/.how-pin/data-stepper/js-stepper) ; auto-advance minuté — barre accent
  verticale .how-fill calée sur l'étape active, remplissage STEP_MS=5,5s puis étape suivante en
  boucle ; ralenti ×0.25 au survol de .how-steps (pas de hard-pause) ; clic-pour-sauter conservé ;
  rAF gated par IntersectionObserver ; prefers-reduced-motion respecté (pas d'auto-advance, piste
  masquée, clic seul moteur) ; sans JS tout s'empile. (3) OISEAU : data-bird-perch déplacé sur
  chacun des 4 .how-step (9 perchoirs réels au total, les autres intacts). Copy des étapes enrichie
  + eyebrow « git diff … +status: done ». Diff limité à la section.
