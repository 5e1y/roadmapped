detail: >-
  Feedback Rémi. Section #how-it-works du site (roadmapped-site). 3 changements : (1) VISUELS :
  remplacer les 4 mockups .how-visual (arbre/terminal/diff/board ASCII) par de vraies PIÈCES ISOLÉES
  de l'UI de l'app (extraites de src/components/ du repo principal : TaskRow, LiveActivityMenu,
  TaskPanel, RoadmapColumns/Graph…), reproduites en HTML/CSS statique theme-aware, peuplées de
  contenu démo — « comme l'iframe mais des morceaux du puzzle isolés » pour faire le lien avec le
  vrai outil. (2) INTERACTION : supprimer le pin-scroll 100vh (.how-pin/.how-scroll[data-stepper],
  script inline L778) ; à la place un AUTO-ADVANCE minuté avec une barre bleue à gauche qui
  progresse par étape puis switch à la suivante (boucle) ; RALENTIR la progression quand la souris
  est dans la zone des 4 points (.how-steps) ; garder le clic-pour-sauter. (3) OISEAU : rendre
  chacun des 4 points perchable (data-bird-perch par point, cf roadmapped-bird.js). Mapping proposé
  01 backlog+TaskRows / 02 LiveActivity / 03 TaskPanel done / 04 board-graph. Voix Rémi, accent-led,
  responsive, valide.
