outcome: >-
  Comportement mobile de How-it-works (retour Rémi, Fable 5, déployé). Sur mobile (≤62rem) : (1)
  exemples cachés — .how-visuals en display:none (html.js-howplay .how-visuals aussi, pour battre la
  spécificité de la gate) ; (2) auto-advance coupé — gate engineOn() = wide(min-width:62rem).matches
  && !calm.matches ; start() sort tôt si !engineOn → plus de timer/rAF/switch/barre ; reapply()
  écoute les 2 media queries (wide + reduced-motion) en live et start()/stop()+setStep(0) au
  franchissement ; (3) étapes en pleine opacité — le dimming (opacity .5 des étapes inactives)
  déplacé dans @media (min-width:62rem) and (prefers-reduced-motion:no-preference), donc mobile OU
  reduced-motion = liste lisible sans « étape active », pas de gouttière vide. Desktop strictement
  inchangé (auto-advance/hover-slow/ui-frame/hauteur égale/callout tous ≥62rem). Perchoirs des 4
  points intacts.
