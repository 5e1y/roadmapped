  .how-stage en align-items:stretch → la fenêtre de droite fait exactement la hauteur du bloc entier
  des 4 points, .ui-frame en flex:1. (3) CALLOUT ALIGNÉ : .how-lane dé-grillé (la piste devient un
  rail absolu left:0 inset, hors flux) → le panneau des étapes démarre pile au bord gauche du
  container, aligné avec le callout du dessous (bonus : le rail accent inset reprend le vocabulaire
  du filet bleu du callout). Vars du site uniquement, perchoirs des 4 points intacts.
