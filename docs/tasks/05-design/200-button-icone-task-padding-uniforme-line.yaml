outcome: >-
  Gabarit unique du Button figé : padding p-s (8px uniforme 4 côtés, était px-m/py-xs 12/4),
  text-xs+leading-none (line-height 12px, text-xs n'est pas un token custom du repo — vérifié dans
  @theme, confirmé), BUTTON_ICON_SIZE 16→12 (= exactement la nouvelle line-height). Bouton = 28px de
  haut dans tous les cas (texte, icône seule = carré 28x28, ou les deux). +task : '+' littéral →
  icône Plus (pattern déjà établi par ZoomControls). Carte blanche exercée : Button passé en
  forwardRef (doctrine TogglePill) pour composer via Base UI render= ; Toast.Close (la 'croix de la
  notif' de la toute première demande) migré sur <Button variant='ghost' icon={Cross}> via render= —
  la limitation 'Base UI non-enveloppable' du tour précédent était fausse ; ViewHeader : input
  recherche réaligné sur le même gabarit 28px que le bouton +task voisin (py-xs→py-s + leading-none)
  ; SidePanel/ViewHeader passent ensemble de 40 à 44px, restent alignés entre eux ; DesignSystemView
  playground + docs/design.md §2 mis à jour pour refléter le nouveau contrat. Impacts visuels notés
  et NON compensés localement (règle explicite) : RemovableChip (Backlog) désormais plus bas que sa
  pilule 24px, écart 24px/28px avec le registre TogglePill (thème/filtres) ailleurs dans l'app.
  Proposition hors-contrat non tranchée : étendre le gabarit 28px à TogglePill pour résorber cet
  écart — à valider.
