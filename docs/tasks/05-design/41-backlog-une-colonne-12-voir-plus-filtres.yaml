detail: >-
  Batch Rémi (2026-07-07). (1) Toutes les listes backlog (vue Backlog + vue Teams) passent en UNE
  colonne large : les 12 prochaines à faire + bouton « voir plus », puis les terminées APRÈS ;
  lignes enrichies (date terminée visible…). (2) Filtres du header ISO : « Tous les stages » et «
  Toutes les teams » doivent avoir la même apparence ET le même comportement — composant FilterMenu
  générique (Popover, compteurs), décliné single (stage) et multi (teams). (3) Radar : typos
  illisibles quand il rétrécit → tailles augmentées ; effet rollover sur les sommets ; le bouton «
  Toutes les teams » du header disparaît — cliquer dans le vide de la fenêtre du radar
  désélectionne. (4) Le bleu de sélection bg-accent/5 est TRANSPARENT : il se mélange au gris du
  fond en Roadmap et laisse voir les pointillés au travers des cartes du Graphe → token opaque
  --color-accent-tint appliqué partout. Fini quand : captures des 4 points, pointillés invisibles
  sous une carte sélectionnée du Graphe.
