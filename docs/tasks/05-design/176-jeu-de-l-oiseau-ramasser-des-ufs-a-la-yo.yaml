detail: >-
  Easter-egg interactif sur roadmapped-site, greffe dans roadmapped-bird.js (overlay canvas
  existant). Des oeufs (egg.svg) apparaissent dans l'UI ; quand l'oiseau s'approche d'un oeuf ->
  anim jump (hop/TAKEOFF_SEQ) + burst de particules dorees & bleues (charte) ; l'oeuf ramasse SUIT
  l'oiseau a la Yoshi. En bas de page (#285) l'oiseau se perche sur le R du footer : y placer le nid
  (nest.svg) ; pose dans le nid -> les oeufs s'empilent de facon comique. Puis de nouveaux oeufs
  reapparaissent ; on reramasse, on redepose ; la pile monte, entassee facon cartoon, peut depasser
  l'ecran. Assets egg.svg/nest.svg copies a la racine du repo site, a embarquer pixel-perfect
  nearest-neighbor a l'echelle SCALE. Confie a Fable sur demande explicite de Remi.
