outcome: >-
  Refonte UX de la Quickstart du site (Fable 5, relu + vérifié). L'ancien bloc unique `<pre
  code-block>` remplacé par 4 blocs distincts `.install-method` : « Claude Code plugin », « or npm
  », « or Straight from GitHub » (le « or » muet = alternatives, pas étapes), + « After install »
  (filet accent inset = convergence). Chaque commande = une `.cmd-row` copiable individuellement
  (bouton .btn-copy dédié + data-copy-text exact + aria-label ; sigil $ hors payload). Réutilise le
  mécanisme de copie existant (handler JS délégué INCHANGÉ) et le vocabulaire filet du site. Ajout
  de 10 classes CSS (vars uniquement → theme-aware light/dark). Responsive (flex-wrap +
  overflow-wrap), a11y (section/h3 + aria-labels + focus-visible). Commandes inchangées (source de
  vérité #298). Répond au feedback : copie par commande + séparation claire des 3 techniques.
