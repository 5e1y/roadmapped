detail: >-
  Feedback Rémi sur #299 : la Quickstart (un seul <pre code-block avec les 3 méthodes en
  commentaires) a une UX faible — impossible de copier une commande précise, méthodes mal séparées.
  Refonte : (1) chaque commande copiable individuellement (réutiliser .btn-copy + data-copy-text,
  handler délégué déjà en place ~L597, aucune modif JS) ; (2) séparer visuellement les 3 techniques
  (plugin Claude Code / npm / github) en blocs/cartes labellisés. Réutiliser les primitifs existants
  (.prompt-copy = tag+texte+bouton, .code-block, vars CSS). Garder les commandes exactes (source de
  vérité #298). Voix Rémi, esthétique terminal minimale, theme-aware, responsive, HTML valide. Repo
  externe 5e1y/roadmapped-site.
