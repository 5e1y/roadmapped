detail: >-
  Demande Rémi (exception explicite : instance Fable 5, malgré la règle « pas de Fable » par
  défaut). V1 = LiveConsole, bouton flottant bottom-left + tiroir. V2 : le déplacer dans la bande
  header (visuellement en haut), améliorer UI, cohésion DS (monochrome + accent bleu rare, Base UI
