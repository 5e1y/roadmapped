outcome: >-
  Notepad pièces jointes en liens (Fable). Drop d'un fichier sur l'éditeur → ligne [fichier:
  /chemin/absolu] au caret (jamais de copie/upload, dropEffect=link) ; 3 canaux d'extraction du
  chemin (file.path Electron > text/uri-list file:// > text/plain drag-terminal), fallback gracieux
  nom-seul + flash « chemin masqué par le navigateur, glisse depuis un terminal » quand le
  navigateur pur ne donne que le nom. Clic sur une ligne fichier → POST /api/reveal (#86 réutilisé
  tel quel, serveur non touché) → Finder macOS ; hit-testing fin (clic après le chemin = place le
  caret, pas de reveal ; sélection en cours = pas de reveal). ⇧⌘C (+ bouton pied « copier pour
  l'agent ») → note nettoyée, lignes fichier → chemins nus, prête à coller au terminal ; ⌘C brut
  natif intouché. Rendu : textarea nue + backdrop « highlighted textarea » aux métriques identiques
  (souligné neutral-300, accent+bg-accent-tint au survol, curseur pointeur), palette strip-down
  respectée. noteFiles.ts pur (parseFileLine/cleanForAgent/insertOnOwnLines/extractDropPaths).
verification: >-
  Vérif indépendante : tsc clean ; vitest 342/342 (+16 noteFiles) ; build OK ; boot HTTP 200.
  Headless Fable 11/11 (drop uri-list/terminal/nom-seul, hover cursor+accent, clic→POST /api/reveal
  {path} intercepté, nom-seul→pas de POST+hint, ⇧⌘C→presse-papier nettoyé relu via
  clipboard.readText). QA visuel (shot-1) : lignes fichier soulignées, survol tint accent, fallback
  maquette.png + message d'aide, bouton « copier pour l'agent ⇧⌘C » en pied — confirmés. Limite
  inhérente au web : Finder→navigateur = nom seul (chemin absolu via drag terminal ou édition
  manuelle) ; ouverture réelle du Finder non observable en headless (wiring POST vérifié, effet
  couvert #86).
release: pre-release
