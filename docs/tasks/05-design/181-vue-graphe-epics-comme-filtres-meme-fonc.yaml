id: 343
title: "Vue Graphe : epics comme filtres (même fonctionnement que la Roadmap)"
status: done
tags:
  - ui
  - graph
detail: >-
  Le graphe de dépendances devient quasi inutilisable dès qu'on utilise des epics (constat Rémi).
  Reprendre le mécanisme éprouvé de la vue Roadmap : la bande d'epics (EpicBand) comme filtre. Un
  epic sélectionné → le graphe ne montre que ses tâches + leurs dépendances directes hors-epic,
  estompées (DimVeil) pour garder le contexte des frontières. Réutiliser EpicBand/FilterMenu et
  l'état de filtre existants — idéalement filtre partagé entre vues (passer de Roadmap à Graph
  conserve la sélection). Pas de nouveau mécanisme.
refs:
