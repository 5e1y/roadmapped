detail: >-
  Demande Rémi (2026-07-07) : un seul modèle de header (barre en haut, style vue Roadmap) dans les
  TROIS vues — hauteur STRICTEMENT identique à celle du header du panneau de tâche (SidePanel).
  Composant partagé ViewHeader (h-12, filet bas). Les filtres quittent la sidebar (supprimer les
  listes Stages et Teams) et deviennent des dropdowns/combobox DANS le header : Backlog = recherche
  + Select stage + dropdown Teams (multi, Popover Base UI) + « + tâche » ; Roadmap = dropdown Teams
  + toggle terminées + segmented Colonnes/Graphe ; Docs = titre + chemin du doc ouvert. Sidebar =
  navigation pure (+ arbre de fichiers en vue Docs). Hooks de filtres déplacés hors de Sidebar
  (state/filters.ts). Fini quand : hauteurs mesurées égales (assertion DOM), filtres fonctionnels
  dans le header des 2 vues, sidebar sans filtre, captures relues.
