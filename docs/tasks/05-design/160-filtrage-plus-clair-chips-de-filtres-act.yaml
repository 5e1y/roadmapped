detail: >-
  Demande Rémi (quickshot). Trois problèmes de filtrage : (1) pas clair qu'il faut recliquer un
  élément (team dans le radar, tag dans la matrice nodale/TagGraph) pour revenir à la normale ; (2)
  sur PETIT écran, quand on ouvre une task sur un backlog filtré, le flanc radar+graph passe en
  `hidden 2xl:flex` (top !== null) → plus AUCUN moyen d'annuler/re-filtrer tant que le panneau task
  n'est pas fermé = cul-de-sac. Fix principal : afficher les FILTRES ACTIFS en CHIPS supprimables (×
  par chip) EN HAUT de la liste du backlog — toujours visibles, hors du flanc masqué — + un bouton «
  Clear all ». Couvre team (teamFilter[]), tag (tagFilter[]) et la recherche (query). Bonus
  discoverabilité (1) : title « Click again to clear » sur les éléments actifs du radar (TeamsRadar)
  et du graph (TagGraph). Refs : Backlog.tsx, TeamsRadar.tsx, TagGraph.tsx, filters.ts.
refs:
