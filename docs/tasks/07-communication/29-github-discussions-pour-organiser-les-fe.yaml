outcome: >-
  GitHub Discussions activées sur 5e1y/roadmapped (gh api PATCH has_discussions=true → confirmé
  true). Répare le lien « Questions & ideas » de .github/ISSUE_TEMPLATE/config.yml qui pointait déjà
  vers /discussions (lien mort jusqu'ici). Catégories par défaut retenues (couvrent le tri des
  feedbacks) : Announcements, General, Ideas (features), Q&A (aide), Show and tell, Polls. Choix
  ponytail : pas de catégorie custom via GraphQL — Ideas + Q&A + General canalisent déjà les
  feedbacks, et blank_issues_enabled=false pousse déjà les questions/idées vers Discussions. Ajout
  d'une catégorie « Feedback » possible en 1 clic UI si Rémi le souhaite (non fait, YAGNI).
verification: >-
