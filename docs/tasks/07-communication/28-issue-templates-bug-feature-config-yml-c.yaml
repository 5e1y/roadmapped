outcome: >-
  Community health GitHub pour canaliser les feedbacks des futurs utilisateurs. Les 2 templates
  markdown basiques (bug_report.md, feature_request.md) remplacés par des ISSUE FORMS YAML (champs
  structurés + validations). bug_report.yml : What happened (requis), Steps to reproduce (requis,
  pré-rempli 1/2/3), Roadmapped version/commit (requis, explique où le trouver : SHA du package-lock
  hôte), Node version (requis, rappelle ≥22.18), OS, Logs/screenshots, + checkboxes garde-fou
  (cherché les doublons, setup supporté). feature_request.yml : The problem (requis, « le problème
  d'abord pas la solution »), What you'd like, Alternatives, + checkbox « une feature non triviale
  exige une spec dans docs/specs/ » (relie CONTRIBUTING). config.yml : blank_issues_enabled:false +
  2 contact_links (Discussions pour le Q&A ouvert, guide utilisateur). Ton Rémi (direct,
  anti-marketing). Scope : #223 = les templates seulement ; le bouton in-app « Report an issue » est
  un autre ticket (#227).
verification: >-
  Les 3 YAML parsent (js-yaml) et passent un sanity check de schéma : name/description/body
  présents, chaque élément de body a type + attributes, config a blank_issues_enabled +
  contact_links complets (name/url/about). bug=8 éléments (4 requis), feature=5 éléments (1 requis +
  garde-fou), config=2 liens. Anciens .md supprimés via git rm. Dépendance notée : le lien
  Discussions résout une fois #224 (activer Discussions) fait.
release: pre-release
