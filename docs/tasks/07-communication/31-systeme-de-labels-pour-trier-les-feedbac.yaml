detail: >-
  Définir un jeu de labels cohérent et minimal pour trier issues/discussions : type (bug, feature,
  question, docs), état (needs-triage, confirmed, wontfix), priorité éventuelle, good-first-issue.
  Éviter l'inflation de labels. Alignez sur les issue templates.
