outcome: >-
  Labels de tri des feedbacks posés sur 5e1y/roadmapped via gh. Constat : les types demandés
  existaient déjà en défaut GitHub (bug, question, enhancement=feature idiomatique, documentation,
  good first issue, help wanted). Gap réel = l'axe PRIORITÉ + un tag feedback. Ajoutés : `priority:
  high` (b60205), `priority: medium` (fbca04), `priority: low` (0e8a16), `feedback` (c5def5, pour
  les retours issus des Discussions). Minimal et additif — aucun label existant modifié/supprimé.
  Réversible (gh label delete).
verification: >-
  gh label list --repo 5e1y/roadmapped : les 4 nouveaux labels présents et corrects
  (nom/couleur/description vérifiés dans la sortie).
