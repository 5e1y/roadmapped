outcome: >-
  Barre de filtres actifs en haut de la liste du backlog (RemovableChip × par filtre + « Clear all
  »), rendue AU-DESSUS du scroller et HORS du flanc radar/graph (qui passe en hidden 2xl:flex quand
  un panneau est ouvert). Couvre team, tag et recherche. Résout le cul-de-sac : panneau task ouvert
  sur petit écran, on peut désormais délester ses filtres sans fermer le panneau. Bonus (2) : title
  « Click again to clear » sur les éléments actifs de TeamsRadar et TagGraph.
verification: >-
