detail: >-
  Installer trinil-react (vérifié : v1.3.9 npm, 1055 icônes outline, tree-shakeable, zéro dep, API
  size/color=currentColor/strokeWidth/className/ariaLabel — banque perso de Rémi). Remplacer les SVG
  inline : Chevron→ChevronRight (garder la classe .chev pour la rotation), ✕→Cross (SidePanel,
  RemoveButton, ChipRemove), ✓→Check (SavedTick, indicateurs de popup), crayon→EditPen, +→Plus,
  copier→Clipboard. GARDER les StatusGlyph maison (cercles vide/demi/plein = identité visuelle du
  produit) — décision design validée. LockLocked servira aux cartes verrouillées (tâche suivante).
  strokeWidth 1.5, tailles calées sur l'existant (10-14px). Fini quand : zéro régression visuelle
  (captures avant/après), tests + build verts.
