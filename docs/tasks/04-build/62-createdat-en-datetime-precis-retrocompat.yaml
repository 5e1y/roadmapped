title: createdAt en datetime précis (rétrocompat date seule)
status: in_progress
tags: []
size: S
team: engineering
detail: >-
  Les nouvelles tâches portent createdAt ISO local à la seconde ("2026-07-08T22:58:41") au lieu de
  la date seule. Rétrocompatible : la validation accepte les DEUX formats (date seule OU datetime),
  le tri (nextQueue/ancienneté) traite une date seule comme minuit. Remplace today() par un now()
  ISO dans addTask (taskWrites.ts). Sert d'audit fin + tiebreaker d'ordre entre agents. TDD : parse
  des deux formats, tri mixte date/datetime correct. Fini quand : nouvelle tâche en datetime (YAML
  relu), anciennes dates toujours valides (validate OK sur le backlog réel SANS migration), build
  vert.
