detail: >-
  Fusion décidée avec Rémi du besoin « epic/regroupement » et de #6 (progression + milestones).
  Décisions tranchées : (1) EPIC = dimension (champ), pas un nouveau type — on réutilise/renomme le
  champ milestone dormant (null sur 119/119 tâches, _roadmaps.yaml absent → migration nulle) en
  `epic`, transverse aux stages ; le dashboard groupe par epic. (2) Le mot « milestone » se libère
  du sens regroupement → il désigne un JALON/verrou : kind:'milestone' (additif comme kind:quick),
  tâche dont d'autres dépendent via dependsOn, rendu distinct (diamant, « bloque N »), verrou via
  computeAvailability existant (option iii de #6, pas de nouvelle sémantique de lock). (3)
  Progression globale : % done/total (globalProgress) + par epic (epicProgress,
  ex-milestoneProgress). Livrable : docs/specs/2026-07-08-hierarchie-regroupement.md. Supersede la
  partie milestone du brouillon #6. Zéro code avant approbation.
