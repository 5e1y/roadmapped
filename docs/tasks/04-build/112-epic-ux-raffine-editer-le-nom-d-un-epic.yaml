outcome: >-
  Epic UX raffiné (Fable). (A) RENOMMAGE : le titre de l'epic-row du Backlog est un input ghost
  permanent (clic sur le nom = éditer, clic ailleurs = déplier) ; blur/Entrée upsert {slug,title}
  dans _epics.yaml via le PUT /api/epics existant (saveEpics) — le SLUG (porté par les tâches) ne
  change jamais, un epic découvert devient déclaré, fichier créé au 1er renommage, Échap annule,
  erreur réseau → revert+ErrorBanner. Zéro back touché. Renommage dans le Backlog seul
  (Colonnes/Graphe affichent le titre à jour sans l'éditer). (B) DÉ-DUPLICATION (helpers purs
  testés) : splitBacklogItems → un epic non-100%-done vit UNIQUEMENT côté « À faire » (ses tâches
  done absorbées/barrées dans le groupe), 100% done → uniquement « Terminées », jamais les deux ;
  epicAnchorStage → stage du ticket non-terminé le plus AMONT (index STAGES min ; 100% done →
  dernier ticket) ; groupByEpicAnchored → un epic ne produit un groupe que dans sa colonne
  d'ancrage, membres cross-stage inclus, omis des autres colonnes. Appliqué Backlog + Roadmap
  Colonnes + Graphe.
