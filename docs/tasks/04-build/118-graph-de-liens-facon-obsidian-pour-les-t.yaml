  Nouveau graphe de liens (façon Obsidian) visualisant les THÈMES (tags) des tickets OUVERTS (todo +
  in_progress). Objectif : voir sur quoi le travail se porte. Clic sur un tag → filtre le backlog
  par ce tag (MÊME système que le radar Teams : radarSelected/useTeamFilter → un teamFilter
  équivalent pour les tags). Placement : dans le flanc DROIT de la vue Backlog, EN DESSOUS du radar
  Teams (TeamsRadar). Nœuds = tags, taille/poids ~ nombre de tickets ouverts portant le tag ; liens
  = co-occurrence de tags sur un même ticket (façon graphe de connaissances Obsidian). Monochrome +
  accent (design.md), le tag actif surligné comme la team active. Carte blanche design Fable 5. NOTE
  ORCHESTRATION : à faire APRÈS #144 (collision src/roadmap.ts + graphe).
