detail: >-
  Routes fichiers plats (pas de front-matter, le nom de fichier + stats FS suffisent) : GET
  /api/notes (liste + dates), GET/PUT /api/notes/:slug (contenu), POST /api/notes (création), POST
  /api/notes/:slug/archive (→ notes/_archive/), DELETE /api/notes/:slug. Plus POST /api/reveal :
  chemin absolu → open -R (macOS) / xdg-open dossier parent (Linux) / explorer /select (Windows).
  SÉCURITÉ /api/reveal : local-only (comme le reste de l'API), chemin absolu EXIGÉ, existence
  vérifiée, REFUS de tout chemin hors du HOME de l'utilisateur. TDD (api.test.ts) : CRUD notes,
  chemin hors HOME refusé, chemin inexistant refusé. Fini quand : les 6 routes répondent, tests API
  verts incl. refus hors HOME.
