team: design
detail: >-
  Aujourd'hui le petit cercle de progression passe en cadenas pour les tâches verrouillées par des
  dépendances uniquement dans la roadmap. Rendre l'indicateur cohérent : afficher le cadenas PARTOUT
  où ce cercle apparaît — lignes du backlog, task bar / panneau de tâche. L'état « locked » est déjà
  calculé (computeAvailability : available/locked/done) ; il faut le threader jusqu'à ces vues et
  réutiliser le même glyphe cadenas que la roadmap. Pas de nouvelle décision visuelle : même cercle,
  même cadenas, juste rendu partout.
