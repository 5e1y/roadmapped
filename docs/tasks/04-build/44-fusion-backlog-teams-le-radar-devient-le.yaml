detail: >-
  Décision Rémi (2026-07-07) : fusionner les vues Teams et Backlog. La vue Backlog devient : colonne
  radar à gauche (charge par team, cartes cliquables) + liste de travail à droite (TaskList 12+voir
  plus, terminées après, archive). La sélection du radar PILOTE le filtre team existant (clic carte
  = filtre sur cette team, re-clic ou clic dans le vide = tout ; le dropdown Teams du header reste
  pour le multi et reflète le même état). Le radar s'efface quand le panneau est ouvert sous 2xl
  (comportement conservé). L'entrée « Teams » disparaît de la nav (View, App, titre, whitelist
  localStorage) ; TeamsRadar extrait dans son fichier, TeamsView supprimée. Fini quand : captures de
  la vue fusionnée (radar + liste), clic carte = liste filtrée + dropdown header synchronisé, nav à
  3 entrées, tests + build verts.
