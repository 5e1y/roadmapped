outcome: >-
  Démarrage flawless du dashboard. Verbe `dashboard` (bin/roadmapped.mjs) : --open injecté PAR
  DÉFAUT dans les args vite → le navigateur s'ouvre seul (vite auto-incrémente le port si occupé).
  --no-open = échappatoire (notre flag, filtré avant de passer à vite car vite ne le connaît pas) ;
  un --open/--open=path explicite de l'utilisateur est respecté (pas de doublon). init affiche « ▶
  Dashboard : npx roadmapped dashboard (ouvre le navigateur ; pas npm run dev, qui lance TON projet)
  » — découvrabilité + désambiguïsation du npm run dev de l'hôte. Décision : PAS de skill agent
  /roadmapped run (brûlerait des tokens à chaque lancement, contre la philosophie token-economy).
  guide.md §2 et setup.md mentionnent déjà la commande.
