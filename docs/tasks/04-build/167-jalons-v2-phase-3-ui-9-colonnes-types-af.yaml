detail: >-
  UI (Fable 5, design). Réf : les 2 docs specs + décisions Rémi. (1) RoadmapColumns/RoadmapView : 9
  colonnes = types (au lieu de 8 stages). (2) Affichage température — DÉCISION RÉMI RÉVISÉE : PAS de
  spectre bleu→orange large ; à la place une ICÔNE THERMOMÈTRE COLORÉE (icône Trinil, couleur
  pilotée par la température, froid→chaud) + la VALEUR numérique (ex. « 48,7° »). La couleur est
  confinée à la petite icône (pas un dégradé appliqué partout). S'affiche là où le chip TEAM
  s'affichait avant (cartes, lignes, panneau). Décomposition auto/base/seed au survol/panneau. (3)
  Bande d'epics transversale au-dessus des colonnes (epics multi-types) — reco doc types §6.3, via
  ancrage majoritaire d'abord si besoin. (4) Remplacer le filtre team (radar supprimé) par un filtre
  type. La température vient déjà calculée dans /api/tree (phase 2). Dépend des phases 1+2 (backend
  intégré à main).
