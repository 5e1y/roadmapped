  instances, une visible) → le panneau reste une instance UNIQUE niveau App (sinon état log/unread
  perdu au switch de vue). Instance unique montée dans App.tsx, positionnée `fixed` top-right pour
  vivre dans la bande header — PAS dans ViewHeader. Seam propre : Fable ne possède que
  src/components/LiveConsole.tsx (+ éventuellement index.css anim, ui.tsx toast) ; il ne touche NI
  ViewHeader NI api NI bin. Spec : docs/specs/2026-07-09-live-updates-v2.md.
