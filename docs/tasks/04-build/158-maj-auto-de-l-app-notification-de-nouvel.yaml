outcome: >-
  MAJ auto notify-only : src/lib/updateNotifier.ts (notifyIfOutdated + isOutdated), appelé au début
  du case 'dashboard' du bin. Compare version installée vs registre npm (fetch natif, timeout
  800ms), cache 1×/jour dans os.tmpdir, notice « update available X → Y : npm install
  roadmapped@latest && npx roadmapped upgrade ». Silence total sur offline/404/JSON invalide/FS.
  Jamais d'install auto (décision). CLI proxy hors scope (YAGNI).
verification: >-
