detail: >-
  ⛔ N'exécuter qu'après approbation de la spec par Rémi. Spec §1 + annexe pt 1 : réécrire SKILL.md
  en noyau ≤ 50 lignes (boussole 5 lignes, cycle take→done, commandes en 1 ligne, interdits
  condensés, ROUTEUR de références) avec DEUX règles d'or : (a) anti-token —
  next/take/start/done/add/quick = zéro lecture de référence, le CLI est autoportant ; (b) l'ÉCHELLE
  de décision façon ponytail — « ce changement mérite-t-il d'exister ? → un quick ? → un task ? →
  une spec ? », stop au premier barreau. Le noyau doit être STRICTEMENT STABLE (aucun contenu
  dynamique — condition du cache, annexe 2). Éclater workflows.md en planning.md et delegation.md ;
  mettre à jour routeur et renvois. À faire APRÈS les tickets CLI 65-66 (les commandes documentées
  doivent exister). Fini quand : wc -l ≤ 50, cycle take→done rejoué en sandbox sans ouvrir une
  référence, bootstrap ~900 tokens.
