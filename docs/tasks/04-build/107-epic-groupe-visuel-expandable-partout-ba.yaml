outcome: >-
  Epic rendu comme GROUPE expandable partout (Fable 5). Nouveau EpicRow.tsx (groupByEpic pur +
  EpicRow + epicStatusOf) + EpicGlyph carré (complète cercle=task / diamant=jalon / carré=epic).
  Chaque epic = ligne/carte/nœud au gabarit d'une tâche mais marquée parente : chevron systématique,
  carré, « N tâches [ici] », mini-barre + done/total (epicProgress global), repliée par défaut,
  dépliage persisté par slug ET par vue (backlog:epics / roadmap:epics / graph:epics). Une task en
  epic ne s'affiche plus à plat ; les one-off restent des rows normales. Toggle « par epic
  »/EpicGroupedList de #133 supprimés (le groupe est le défaut). Couvre Backlog (TaskColumns),
  Roadmap Colonnes (EpicCardGroup, epic à cheval = présent dans chaque colonne avec compte local «
  ici » + complétion globale) et Graphe (UN nœud par epic ancré au stage amont, arêtes = union des
  deps externes remappées/dédupliquées, dépliage en place). A11y : ligne = 1 seul button trigger,
  aria-expanded, complétion en sr-only.
