detail: >-
  Remplacer l'affichage des dates littérales par du relatif (« il y a 3 j », « il y a 2 sem »)
  partout où une date apparaît (createdAt, startedAt, completedAt, done du jour…). Date absolue en
  title/tooltip au survol. Un seul helper de formatage relatif, réutilisé (i18n FR). Base UI si un
  composant existe.
