outcome: >-
  Helper unique src/lib/relativeTime.ts : relativeTime() (Intl.RelativeTimeFormat fr, numeric
  'always' → « il y a 3 jours », « il y a 1 an » ; accepte ISO ou ms ; renvoie l'entrée brute si non
  parsable) + absoluteDate() pour le tooltip. Câblé sur les 4 sites de rendu de dates : DocsTree
  (createdAt), TaskRow (completedAt), TaskPanel footer (créée · terminée), NotepadView (modified —
  remplace l'ancien relDate absolu inline dd/mm/yy). Date absolue jj/mm/aaaa en title au survol
  partout.
