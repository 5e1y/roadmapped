  un triage de la charge courante (rôle distinct du radar Teams qui, lui, reste sur la charge
  ouverte). Passer activeTasks+archivedTasks à tagGraph (aujourd'hui filtré aux ouverts). Le
  clic-filtre reste inchangé (matches() filtre déjà colonnes ouvertes ET terminées → un tag
  done-only filtre la colonne Terminées, cohérent). Fichiers : src/components/TagGraph.tsx,
  src/components/Backlog.tsx, src/lib/tagGraph.ts (+ ajuster son test). À faire par moi (mécanique),
  APRÈS #148 (collision src/).
