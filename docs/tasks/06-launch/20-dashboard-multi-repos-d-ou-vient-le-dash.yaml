detail: >-
  DEUX volets. (1) DOC — clarifier le modèle : le CODE du dashboard vient du PAQUET
  (node_modules/roadmapped, ou le repo standalone), mais il affiche les DONNÉES du repo HÔTE
  (ROADMAPPED_ROOT, résolu depuis le cwd). Un paquet, N hôtes. À documenter (guide/README). (2) BUG
  à corriger — l'idempotence #153 (bin/roadmapped.mjs) sonde localhost:5173/api/tree et no-op dès
  qu'un {ok:…} répond, SANS vérifier que ce dashboard sert le MÊME host root. Donc : dashboard
  ouvert sur repo A (5173) → 'npx roadmapped dashboard' dans repo B voit A, dit 'déjà ouvert → 5173'
  et affiche les données de A (faux !). Fix : /api/tree (ou un /api/whoami) renvoie le hostRoot ; la
  sonde compare — même root → no-op ; root différent → laisser Vite démarrer sur le port suivant
  (auto-increment). Workaround immédiat à documenter : 'npx roadmapped dashboard --port 5174' pour
  le 2e repo.
