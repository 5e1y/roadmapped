detail: >-
  Selon l'audit des licences deps : produire un NOTICE / THIRD-PARTY-LICENSES si des dépendances
  l'exigent (BSD/MIT avec clause d'attribution, Apache-2.0 NOTICE…). Dépend de l'audit des licences.
