    text: >-
      BILAN DISPONIBILITÉ « Roadmapped » (recherche 2026-07-11, vérifiable) :

      • npm `roadmapped` : LIBRE (registry.npmjs.org → 404).

      • GitHub org `roadmapped` : LIBRE (api.github.com/users/roadmapped → 404 ; on utilise `5e1y`
      aujourd'hui).

      • roadmapped.dev : À NOUS (Cloudflare, domaine actif depuis migration #288).

      • roadmapped.work : À NOUS (Cloudflare, créé 2026-07-07, abandonné au profit de .dev).

      • roadmapped.com : TIERS (créé 2015-10, registrar Annulet LLC, exp. 2026-10-03).

      • roadmapped.ai : TIERS (NameCheap, exp. 2026-07-13 — dans 2 jours, pourrait tomber, à
      surveiller).

      • roadmapped.io : LIBRE. • roadmapped.co : LIBRE.

      • roadmapped.app : indéterminé (pas de A record, whois .app restreint — vérifier chez un
      registrar).

      • Trademark « Roadmapped » : AUCUN enregistrement trouvé (USPTO, Justia, Trademarkia, EUIPO).
      Signal préliminaire favorable MAIS ce n'est PAS une clearance formelle — un vrai search
      classes Nice 9 (logiciel) + 42 (SaaS) s'impose avant tout dépôt.

      DÉCISIONS RESTANTES (owner-remi) : réserver npm + org GitHub `roadmapped` (défensif,
      gratuit/quasi) ; décider .io/.co en défensif ; clearance trademark formelle + dépôt éventuel.
      Aucun blocage rédhibitoire identifié.
    resolved: false
  - date: "2026-07-11T13:34:43"
    author: claude
    text: >-
      « RÉSERVE TOUT » — aucune réservation n'est faisable par l'agent (comptes/paiement/web-UI).
      Mode d'emploi pour Rémi :

      1. npm `roadmapped` (LIBRE) : `npm login` puis publier un STUB pour tenir le nom. ⚠️ Tension
      avec la décision github-only/no-npm-publish (mémoire) : un stub défensif (package minimal dont
      le README dit « install via github:5e1y/roadmapped ») HOLD le nom sans en faire un canal de
      distribution. À trancher : soit tu acceptes ce stub défensif, soit tu laisses le nom libre
      (github-only assumé). Je ne l'ai pas fait (ne pas contredire la décision sans ton aval).

      2. Org GitHub `roadmapped` (LIBRE) : création web-only → github.com/organizations/plan
      (gratuit). Ensuite tu peux transférer 5e1y/roadmapped dans l'org ou garder le repo perso.

      3. Domaines : `.io` et `.co` LIBRES → enregistre chez ton registrar (Cloudflare, cohérent avec
      .dev/.work). `.ai` expire le 2026-07-13 (2 jours) — backorder possible si tu le veux, sinon il
      retombera peut-être libre. `.com` (2015) et `.ai` (tiers) = pas dispo à l'amiable.

      4. Trademark : aucun « Roadmapped » enregistré trouvé → si dépôt, clearance formelle classes
      Nice 9+42 (avec conseil).
    resolved: false
  - date: "2026-07-11T14:53:04"
