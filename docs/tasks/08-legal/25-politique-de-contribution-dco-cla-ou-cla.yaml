commit: 0484f62
outcome: >-
  Cadre légal des contributions posé : DCO plutôt que CLA (décision — mainteneur solo, projet MIT :
  le CLA/cession de droits est disproportionné, le DCO donne la provenance sans paperasse ni infra).
  CONTRIBUTING.md gagne une section « Licensing of contributions » : (1) inbound=outbound explicite
  — toute PR est licenciée au projet sous MIT ; (2) DCO via `git commit -s` (Signed-off-by), lien
  vers developercertificate.org, consigne name/email cohérents. Template de PR : case à cocher «
  commits signés (DCO) ». Non enforced en CI pour l'instant (friction basse ; une GitHub App DCO
  pourra durcir plus tard si le volume de PR le justifie).
verification: >-
  CONTRIBUTING.md relu (section ajoutée avant « Reporting issues », ancre
  #licensing-of-contributions correcte) ; PULL_REQUEST_TEMPLATE.md relu (ligne DCO ajoutée à la
  checklist, lien relatif ../CONTRIBUTING.md valide depuis .github/).
