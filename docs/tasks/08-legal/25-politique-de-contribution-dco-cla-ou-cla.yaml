detail: >-
  Décider et documenter le cadre légal des contributions externes : DCO (Signed-off-by) léger, ou
  CLA, ou clause « inbound=outbound » dans CONTRIBUTING. Éviter l'ambiguïté sur la propriété/licence
  des PRs des futurs contributeurs. Coordonner avec la gouvernance GitHub (support).
