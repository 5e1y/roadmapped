detail: >-
  Suite de l'audit #408 (findings détaillés dans son outcome + le journal du workflow
  wf_16ada12c-329, groupe 'core-primitives'). Deux volets sur ce lot de fichiers : (1) corriger les
  dimensions figées cataloguées par l'audit pour ce groupe (h-*/w-*/size-*/style inline →
  flex+padding-token ou clamp min/max légitime) ; (2) migrer TOUT padding/gap/margin sur l'échelle
  Tailwind numérique par défaut (px-2.5, py-1, gap-2, px-4...) vers les utilitaires token
  (px-xs/s/m/l/xl) selon la table de correspondance validée (arrondi au token le plus proche,
  égalité tranchée vers le haut ; hors-échelle >24px composé en calc() de tokens plutôt que clampé).
