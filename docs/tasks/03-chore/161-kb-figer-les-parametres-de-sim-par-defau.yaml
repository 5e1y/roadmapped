id: 321
title: >-
  KB : figer les paramètres de sim par défaut choisis par Rémi (spring 160, repulsion −200,
  centering 0.040, friction 0.50, settle 240, theta 0.50, radius 7/40)
status: done
tags:
  - kb
  - graphify
heat: 85
detail: >-
  Rémi a tuné via le panneau Display (#318) et validé ces défauts pour KB_SIM (src/lib/kbSim.ts) :
  Spring length LINK_DIST=160 (était 55) ; Repulsion CHARGE_BASE=-200 (était -40) ; Centering
  CENTER_K=0.040 (était 0.05) ; Friction=0.50 → VELOCITY_KEEP=0.50 (UI friction = 1−VELOCITY_KEEP) ;
  Settle time=240 ticks → ALPHA_DECAY = 1 − 0.001^(1/240) (était 180) ; Theta=0.50 → THETA=0.50,
  donc THETA2=0.25 si dérivé (était 0.9/0.81) ; Node radius min R_MIN=7 (était 5) ; Node radius max
  R_MAX=40 (était 22). Mettre ces valeurs comme DÉFAUTS dans KB_SIM. Le panneau Display reste
  (override live + persistance) ; un user sans override custom obtient désormais ces défauts.
  Adapter les tests kbSim si des valeurs y sont codées en dur. Vérifier la cohérence avec le fix
  aperçu-sans-limites #319 (plus d'écartement).
