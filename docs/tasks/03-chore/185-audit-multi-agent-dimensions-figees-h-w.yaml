detail: >-
  Constat déclencheur : augmenter le spacing du thème github n'a fait bouger AUCUN
  bouton/header/rail — repéré : ViewHeader.tsx:41 header h-12 fixe, NavRail.tsx:71 icône size-9
  fixe, NavRail.tsx:94 rail w-16 fixe, SidePanel.tsx:99/101 panneau w-[380px] + header h-12 fixes.
  Aucun de ces éléments ne dérive sa taille du flex+padding via --spacing-*, alors que leur layout
  EST déjà flex. Rémi : RIEN dans l'app ne doit avoir de dimension figée qui pourrait dériver d'un
  flex/stack + token — SEULE exception : de vrais clamps min-w/max-w/min-h/max-h par-dessus un
  dimensionnement flex (ex. barre de recherche : flex-1 + max-w, pas une largeur fixe). Scan
  exhaustif multi-agent (plusieurs Fable en parallèle, un par zone du code) pour cataloguer CHAQUE
  cas dans src/components. Pas de fix dans cette tâche — audit seul, catalogue des trouvailles avec
  fichier:ligne + proposition de remplacement (padding+token / flex-basis / etc.).
