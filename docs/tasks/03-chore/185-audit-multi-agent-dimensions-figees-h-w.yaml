  RoadmapGraph CARD_W/H/MEMBER_H pour dagre, TagBars height:240). TROUVAILLE RACINE (high,
  core-primitives) : les 5 peaux canoniques de ui.tsx
  (fieldCls/ghostCls/primaryBtn/actionBtn/togglePillCls) utilisent l'échelle Tailwind NUMÉRIQUE par
