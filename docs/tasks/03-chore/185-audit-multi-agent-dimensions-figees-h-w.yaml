  symptôme déclencheur (rien ne bouge sur les boutons). Constat transverse signalé par 6 des 7
  agents indépendamment : quasi TOUS les paddings/gaps de l'app sont sur l'échelle Tailwind par
  défaut, pas les tokens — bien plus large que les 44 dimensions figées cataloguées, hors scope de
  cet audit (dimensions de boîte, pas paddings).
