  du rung dedup. Résultat prévisible : un agent met tout en quick, jamais d'epic ni de feedback.
  Fixes (P1, à longueur ÉGALE ou MOINDRE en coupant les redondances type-tree ×4 / temperature ×3 /
  Compass) : (1) rung 1 dedup -> issue explicite : ticket ouvert=feedback, done+même scope=reopen,
  done+nouveau scope=quick ; (2) ajouter rung epic (3+ tickets pour un même résultat -> --epic) et
  rung subtask (tranche non-autonome d'un ticket) ; (3) quick --type OBLIGATOIRE (retirer le défaut
  1st-open-type) côté CLI (cmdQuick) + MCP (tool quick) + tests + doc ; (4) table de décision 5
  lignes en tête (quick/add/epic/feedback/subtask, 1 déclencheur/ligne) ; (5) réparer le trigger
  Router subtasks (par intention, pas 'hand-edit YAML') + ajouter les règles de décision aux
  §Epics/§Subtasks de formats.md. NB SKILL.md = hardlink (.claude/skills + skills), une édition
  couvre les deux.
