outcome: >-
  Audit adversarial complet (2 passages, angles croisés) : 11 trouvailles actionnables. Bug confirmé
  : SWATCH thème Cursor désynchronisé (#0b6bcb bleu au lieu de #1a1a17 noir, dupliqué
  ThemePicker.tsx+SettingsView.tsx). Doctrine contredite : text-[10px] (FlowAreaChart.tsx ×2) sous
  le plancher 11px que le fichier prétend pourtant respecter. Risque structurel : --radius-* non
  reseté dans @theme (silencieux si un rounded-md apparaît un jour). 6 échelons/valeurs innommés
  mineurs (rounded-[3px], text-[13px], INDENT_PX=14, pl-[26px], w-[380px], text-[2rem]). 2 chantiers
  de nommage identifiés pour la suite (text-[11px]×114, niveau text-base des titres de panneau).
  Couverture détaillée dans le rapport agent. Suite → tickets #400-#404.
verification: >-
  Recherche pure, aucun fichier modifié. Couverture: 100% sur
  hex/rgb/oklch/hsl/arbitrary-values/style inline/classes Tailwind par défaut ; TaskPanel.tsx
  échantillonné plutôt qu'intégral (déclaré).
