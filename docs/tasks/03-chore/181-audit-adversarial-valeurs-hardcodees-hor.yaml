detail: >-
  Ratisser tout le code applicatif (src/, hors tests) pour toute valeur visuelle qui contourne le
  contrat de tokens sémantiques : hex couleur en dur (hors index.css lui-même), px de
  rayon/marge/padding/gap en dur au lieu de var(--radius-*)/var(--spacing-*)/classes Tailwind
  générées, rgba/oklch en dur dupliquant une valeur déjà nommée. Sert de base factuelle à la refonte
  'suppression de la couche primitives' + à l'extension du theming aux spacing (discussion en cours
  avec Rémi).
