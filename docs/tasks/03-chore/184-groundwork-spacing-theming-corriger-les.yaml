  sur un multiple de la grille (12 ou 16) et si possible le sortir en token spacing plutôt qu'une
  constante JS. Vérifier aussi si d'autres constantes JS similaires (recherche 'PX' en majuscules
  dans src/components) échappent de la même façon au contrat. Ne PAS toucher aux dimensions de
  layout pur (largeurs de colonnes, tailles de chart) qui ne sont pas du spacing sémantique.
