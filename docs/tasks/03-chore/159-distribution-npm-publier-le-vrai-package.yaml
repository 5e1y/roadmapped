outcome: >-
  Distribution npm en place. roadmapped@0.1.0 publié sur npm (registry 200, `npm view` OK, `npx
  roadmapped --help` depuis npm sans github/node_modules fonctionne → l'E404 bare est mort). Montage
  : github reste la source unique ; CI GitHub Actions (.github/workflows/npm-publish.yml) publie sur
  push main touchant package.json SEULEMENT si la version est nouvelle (bump = seul signal) ; secret
  repo NPM_TOKEN (Automation token). Le 1er publish a été fait PAR la CI (workflow_dispatch) —
  publish manuel impossible car 2FA npm = passkey (pas d'OTP CLI). L'auto-update runtime #294 garde
  chaque install à jour depuis github HEAD quelle que soit la source. Sécurise le nom npm de #221.
  NB sécurité : un 1er token avait été exposé en clair (collé comme nom de secret) → signalé à Rémi
  pour révocation, secret junk supprimé, NPM_TOKEN reposé proprement via l'UI web.
verification: >-
