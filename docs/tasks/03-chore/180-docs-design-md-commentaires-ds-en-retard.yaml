  posent désormais les 10 rôles sémantiques en valeurs LITTÉRALES directes, sans primitives nommées
  par position. La table de mapping 'rôle → primitive' n'a plus de sens telle quelle. Objectif :
  réécrire design.md §1 pour qu'il reflète l'état RÉEL du contrat de tokens (voir src/index.css
  @theme + les 5 thèmes intégrés + src/components/DesignSystemView.tsx qui, lui, est déjà à jour et
