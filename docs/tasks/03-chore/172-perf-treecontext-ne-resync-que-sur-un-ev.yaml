detail: >-
  Audit perf #357 (docs/audit-performance-2026-07.md). TreeContext recharge le tree entier (payload
  ~630Ko) sur TOUT event SSE 'change', y compris une régé Graphify qui ne touche aucun ticket. Fix :
  le broadcast SSE porte déjà (ou peut porter) les paths changés — ne recharger le tree que si un
  fichier docs/tasks a bougé ; les events KB/graph vont au KbProvider, pas au TreeProvider. Réduit
  les re-render en cascade. Test : event SSE hors docs/tasks → pas de reload du tree.
