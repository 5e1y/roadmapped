completedAt: "2026-07-19T00:41:35"
commit: 740f07d
outcome: >-
  TreeContext ne resync que sur un event SSE touchant un ticket (audit perf #357). Prédicat pur
  shouldReload(data) exporté : parse event.data {paths}, ne recharge que si un chemin concerne une
  tâche (contient 'tasks/' OU finit en .yaml/.yml — les tickets sont les seuls .yaml de l'arbre
  surveillé). Subtilité vérifiée par l'agent : une écriture de ticket émet DEUX chemins
  (tasksDir-relatif sans préfixe + docsDir-relatif 'tasks/...'), l'extension les couvre. Fail-safe =
  RECHARGER dans tous les cas ambigus (payload absent/malformé, paths vide/non-string) : jamais
  rater une vraie écriture prime sur la perf. Plus de reload du tree (~630Ko) sur régé Graphify ou
  note. KbContext non touché.
verification: >-
  11 tests du prédicat : fail-safes + 3 formes réelles de chemins-tâches + Graphify/notes ignorés.
  tsc clean, suite complète 673/673, build OK.
release: 0.2.3
