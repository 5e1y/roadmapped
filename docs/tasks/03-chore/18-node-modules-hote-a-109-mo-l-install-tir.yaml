detail: >-
  Un utilisateur qui veut juste CLI+MCP de gestion de tâches se retrouve avec 109 Mo de node_modules
  (React, Vite, Tailwind, @base-ui, dagre, trinil, marked). Piste : déplacer les deps DASHBOARD-only
  en optionalDependencies/peerDependencies (ou un paquet séparé) pour que l'install noyau
  (CLI+MCP+hooks) reste léger ; 'npx roadmapped dashboard' installe/demande les deps dashboard à la
  volée. Décision d'archi — probablement une petite spec. Bloquant adoption.
