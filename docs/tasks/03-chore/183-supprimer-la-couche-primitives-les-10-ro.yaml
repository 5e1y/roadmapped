outcome: >-
  Couche primitives supprimée : accent-tint/white/page/neutral-900/500/200 renommés en
  active/foreground/background/texthard/textsoft/border (valeurs littérales, plus d'alias var())
  dans @theme, le bloc dark de base et les 5 thèmes intégrés (10 blocs).
  neutral-50/100/300/400/600/700/800 supprimés. Action/highlight restent des alias rôle→rôle
  (var(--color-accent)), pas des primitives — la bascule sombre/thème continue de suivre sans
  redéclaration. 14 usages externes + 1 trouvé en plus (KbGraph.tsx:603 fill=var(--color-white))
  remappés sur les rôles. Usages internes d'index.css (body, scrollbar, .doc-prose) remappés :
  neutral-100→background ('recessed field fill', déjà doctrine design.md), neutral-600→textsoft.
  Commentaire périmé (border-neutral-200) corrigé en ring-border/border-border.
