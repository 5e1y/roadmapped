size: S
detail: >-
  Helper node-only `unloggedCommits(tree)` dans src/lib/render.ts (à côté de git()) : prend le
  `commit` de la tâche au completedAt le plus récent (actives + archive), compte `git rev-list
  --count <sha>..HEAD` ; retourne {count, sinceId} ou null (pas de git / pas de sha consigné / sha
  inconnu après rebase — dégrade sans bruit). `sitrepText(tree, errors, unlogged?)` : 3e param
  optionnel, ligne `⚠ N commit(s) non consigné(s) depuis #<id>` seulement si N>0 ET aucune
  in_progress (commits pendant une tâche en cours = travail normal). Les DEUX surfaces appellent le
  helper : cmdSitrep (scripts/task.mjs) et le handler sitrep MCP (scripts/mcp-server.mjs). Tests
  render.test.ts : ligne présente/absente selon count et in_progress, muet si null. Fini quand :
  sitrep réel du repo affiche la ligne après un commit de test non consigné et se tait après
  consignation.
