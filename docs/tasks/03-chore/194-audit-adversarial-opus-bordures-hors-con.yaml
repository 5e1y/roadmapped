detail: >-
  Suite de #425 (2 cas confirmés : checkbox FilterMenu en border réelle, input search KB en chrome
  natif non neutralisé). Scanner TOUT le reste de l'app avec des agents Opus en prompt adversarial
  pour trouver d'autres cas similaires : (a) toute classe Tailwind border-* RÉELLE (border,
  border-t/b/l/r/x/y, border-2/4/8, border-solid/dashed/none, border-color sans ring) qui rend une
  vraie bordure DOM au lieu du pattern ring-inset/box-shadow imposé par design.md (#395) ; (b) tout
  <input>/<select>/<textarea> avec un type/appearance qui laisse le navigateur imposer son propre
  chrome (bordure, radius, cancel-button) non neutralisé par appearance-none, notamment tout
  type="search"/"date"/"number" restant.
