outcome: >-
  Audit complet (7 zones, 38 fichiers, 2 passages à méthodes différentes chacun) : AUCUNE autre
  vraie bordure CSS trouvée au-delà des 2 déjà corrigées (#425). Tous les hits 'border' restants
  sont des faux positifs vérifiés (ring-border/bg-border/shadow-inset var(--color-border), le token
  couleur via une technique autorisée). 1 commentaire périmé corrigé (ui.tsx ErrorBanner,
  mentionnait encore l'ancien border-l-4). 2 points substantiels remontés pour arbitrage (non
  tranchés par les agents) : (1) TextInput/GhostInput (ui.tsx) spreadent ...props dans Base UI sans
  appearance-none — un futur appelant POURRAIT réintroduire le bug KbView en passant type='search'
  etc., aucun garde-fou dans le wrapper lui-même ; (2) KbDisplayMenu.tsx sliders <input
  type='range'> sans appearance-none — mais AJOUTER appearance-none casserait tout le rendu
  (piste+curseur) sans reconstruction manuelle ::-webkit-slider-thumb/::-moz-range-thumb, ce n'est
  pas un fix à l'aveugle.
