outcome: >-
  Vraie unification cette fois : UN composant Button (ui.tsx), 3 variants (primary/secondary/ghost),
  icône ET texte chacun optionnels/combinables. Icône TOUJOURS fixée à 16px (constante, aucun prop
  size, aucune adaptation par emplacement) et texte TOUJOURS text-xs, pour les 3 variants sans
  exception. primaryBtn/actionBtn (strings historiques) supprimés — plus aucun usage direct. TOUS
  les call-sites migrés : SectionPanel, ViewHeader (+task), TaskPanel (Done/Cancel/Start/Finish/Copy
  brief/Delete/Resolve-Reopen + RemoveButton), DesignSystemView (playground), UpdateNotice
  (Update&restart avec Download, Copy/Copied avec Check/Copy — c'était le bug concret pointé : icône
  à 11px hors du composant), + crawl complet (ZoomControls −/Fit/100%/+ passés en ghost). Exclusions
  documentées (hors scope, pas des boutons d'action ponctuelle) : ThemeToggle/ThemePicker (toggles à
  état persistant), triggers Select/Combobox/Popover (menus), Popover.Close pleine-largeur
  d'UpdateNotice, EpicBand chip de filtre actif (fond plein au repos = pas ghost), Toast.Close et
  Combobox.ChipRemove (composants Base UI natifs, structurellement non-enveloppables — alignés
  manuellement sur icône=16 où pertinent).
verification: >-
  tsc -b clean, suite complète 58/58 fichiers 742/742 tests verts. Aucune vérification visuelle
  navigateur (outil indisponible) — les changements de gabarit (py-s→py-xs sur UpdateNotice, icônes
  agrandies partout) sont attendus et acceptés tels quels, à ajuster visuellement plus tard si
