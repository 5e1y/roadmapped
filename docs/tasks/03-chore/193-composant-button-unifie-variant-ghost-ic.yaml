id: 419
title: >-
  Composant Button unifié (primary/secondary/ghost) — icône toujours à la line-height, migration
  complète
status: done
tags:
  - ds
  - theming
detail: >-
  Constat (retour Rémi) : primaryBtn/actionBtn (ui.tsx) sont les 2 seules recettes de bouton
  canoniques (primaire plein, secondaire bordé) mais tout bouton icône-seule de l'app (retour/fermer
  de SidePanel, RemoveButton de TaskPanel/NotepadView/Backlog/RoadmapColumns, croix de dismiss
  d'UpdateNotice, ChipRemove...) est un className dupliqué ad hoc (rounded-interactive p-xs
  text-textsoft hover:bg-rollover hover:text-texthard, répété ~15 fois avec des variations mineures)
  au lieu de passer par un vrai composant partagé.\n\nObjectif : ajouter un 3e variant 'ghost' au
  système de bouton (à côté de primaryBtn/actionBtn) — un IconButton dédié, dimensionné pour que
  l'icône seule occupe la MÊME hauteur de ligne que le texte des boutons primary/secondary
  (aujourd'hui primaryBtn = py-xs + text-xs ≈ 24px de haut ; l'icône du ghost doit remplir ce même
  gabarit — calibrer padding/taille d'icône pour tomber sur ~24px, en restant sur des tokens spacing
  existants, pas une valeur en dur). États : hover:bg-rollover hover:text-texthard (déjà le pattern
  actuel, à centraliser), focus-visible standard (global index.css), disabled si besoin.\n\nMigrer
  TOUS les usages ad hoc recensés vers ce composant (grep 'rounded-interactive p-xs' comme point de
  départ, mais vérifier exhaustivement — ne pas se fier qu'au grep) : SidePanel.tsx (boutons retour
  + fermer), TaskPanel.tsx (RemoveButton + autres icônes ponctuelles), NotepadView.tsx (bouton
  retrait de ligne), Backlog.tsx (RemoveButton de chip), RoadmapColumns.tsx (bouton edit),
  UpdateNotice.tsx (dismiss), ui.tsx (Combobox.ChipRemove, Toast dismiss si présent). Ne pas toucher
  aux boutons qui portent AUSSI du texte (ceux-là restent sur primaryBtn/actionBtn) ni aux
  boutons-icône qui ont une sémantique de TOGGLE (ThemeToggle, ThemePicker trigger — ceux-là gardent
  leur propre recette, ce ne sont pas des actions ponctuelles ghost).\n\nGate : ce composant
  remplace un pattern dupliqué par un seul point de vérité — si un usage a une variation visuelle
  légitime (ex. opacity-0 + group-hover pour les RemoveButton révélés au survol de leur ligne), le
  composant doit accepter cette variation en prop plutôt que de forcer un seul rendu partout.
