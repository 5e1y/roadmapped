detail: >-
  Audit perf #357 (finding principal, docs/audit-performance-2026-07.md). TaskFileMap est
  Record<string,string> : chaque /api/tree re-lit ET re-parse ~350 fichiers 3× (buildTaskTree +
  validateAll + unicité id) = ~1050 yaml.load/requête, 2-4s à froid sur HDD. Fix : parser une fois,
  passer les objets parsés aux validateurs (changer la frontière TaskFileMap ou mémoïser le parse) ;
  cache du tree invalidé par le fs.watch DÉJÀ existant (api.ts) — une lecture ne recharge que si un
  fichier a changé. Impact direct sur le symptôme CPU/disque du user 8Go/HDD. Mesurer avant/après.
