  forme EXISTE (rayon=strate, pas interactivité, ~90% suivie) ; langage de sélection propagé sur 7
  surfaces, s'arrête aux 2 vues récentes (Overview PreviewRow + Activity EntryRow — les exemples de
  Rémi, confirmés one-liners). 1 BLOQUANT a11y (nœuds KB souris-seule). 9 chantiers C0-C9 dont page
  Design System à raccourci clavier.
