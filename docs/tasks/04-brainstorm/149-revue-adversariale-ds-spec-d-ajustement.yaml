outcome: >-
  Revue adversariale DS sur TOUTE l'app, 7 dimensions Fable (tokens, typo, composants, layout,
  interaction, iconographie + 7e passe langage-de-forme demandée par Rémi). 7 rapports persistés
  dans docs/ds-review-2026-07/, synthèse dans docs/specs/2026-07-19-ds-consistency.md. Verdict : le
  brief « aucune DA » est exagéré — socle solide (tokens/thème/tri-couche/glyphes/kit
