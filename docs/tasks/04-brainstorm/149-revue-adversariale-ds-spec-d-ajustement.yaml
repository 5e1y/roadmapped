detail: >-
  Revue adversariale (brief négatif : « le DSM est furieux, l'app est un bordel, aucune DA continue
  »). 6 dimensions auditées en parallèle par des instances Fable, chacune sur TOUS les écrans
  (Backlog, Overview, Roadmap, Dependencies, Graph, Activity, Docs, Notepad + rail + panneaux) : (1)
  tokens/couleur/thème, (2) typo/espacement, (3) composants/primitives, (4) layout/shell/états, (5)
  interaction/motion/a11y, (6) iconographie/langage visuel. Chaque finding avec fichier:ligne +
  preuve (pas d'invention malgré le brief négatif). Livrable : docs/specs/ grosse spec d'ajustement
  + epic de fixes + une page « Design System » dans l'app (raccourci clavier) pour que le DSM
  contrôle/suive. Référence : docs/design.md (auditer l'adhérence ET les trous de design.md
  lui-même).
