detail: >-
  Deux features liées touchant le modèle de données — une seule spec. (a) Progression totale vers le
  goal : définition du % (simple compte de tâches vs pondération par size), portée (globale, par
  section, par roadmap), affichage (header de la vue Roadmap, sidebar). (b) Tâches spéciales «
  milestone » qui verrouillent toute action sur les autres tâches tant qu'elles ne sont pas done :
  modèle (nouveau champ ou valeur réservée, rétrocompatible), sémantique exacte du verrou (bloque
  tout le backlog ? seulement les sections suivantes ?), impact sur next / roadmap / validate / le
  CLI / le dashboard, rendu visuel dans les vues. Livrable :
  docs/specs/AAAA-MM-JJ-progress-milestones.md approuvée par Rémi. Ensuite : tâches d'implémentation
  (schéma + validate + CLI + UI + mise à jour du skill et de ses references). Zéro code avant
  approbation.
