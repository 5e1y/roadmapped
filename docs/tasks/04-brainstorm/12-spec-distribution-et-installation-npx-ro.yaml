outcome: >-
  Spec docs/specs/2026-07-08-distribution.md écrite (cadrage : les deux — skill + npx). Paquet npm «
  roadmapped » (retirer private, ajouter bin/files/engines) exposant bin/roadmapped.mjs :
  init/upgrade/dashboard + proxy des autres verbes vers scripts/task.mjs (CLI portable `roadmapped
  <cmd>`). Le skill reste le point d'entrée agent mais délègue au bin. `npx roadmapped init` pose
  config + squelette 8 stages + skill dans .claude/skills/ + entrée .mcp.json + hook guard ;
  `upgrade` recopie le tool-owned sans toucher docs/tasks ni config. Correctif structurant :
  dissocier racine-paquet / racine-hôte dans paths.ts.
verification: >-
