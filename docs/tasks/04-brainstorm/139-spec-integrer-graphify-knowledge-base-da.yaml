outcome: >-
  Spec réécrite pour l'intégration PROFONDE de Graphify (docs/specs/graphify-kb.md, 382 l.). VERDICT
  PYTHON = pas trop lourd, GO option (b) : détecter Python ≥3.10 + install de graphifyy dans un env
  isolé (uv tool install → pipx → venv), ~28 Mo téléchargés / ~80-120 Mo disque (numpy domine), le
  paquet npm ne bouge PAS ; piège évité = l'extra Leiden graspologic (200 Mo+ scipy/sklearn/…) non
  installé, fallback clustering python-louvain (0,2 Mo). Bundler un runtime Python = rejeté. Étape
  ensureGraphify dans init : idempotente, dégradée si pas de Python (log + continue), consentement
  TTY séparé pour l'install (~28 Mo) et la génération (coûte des tokens, jamais faite par
  install.mjs), gitignore graphify-out/, marche sur les 3 voies. TICKETS⇄GRAPHE dérivé : correction
  — Graphify n'indexe PAS les .yaml (les tickets ne sont pas des nœuds), MAIS le champ refs (déjà au
  schéma) joint refs⇄source_file → src/lib/kbLink.ts (pur) donne le voisinage KB d'un ticket +
  l'index inverse, ZÉRO champ kbLinks, schéma/validation intacts. UI = « Connected in the knowledge
  base » dans TaskPanel + « Tickets touching this » dans l'inspecteur de nœud. Placement (b)
  sous-onglet Docs confirmé. PLAN 4 phases : slice 1 (~1,5j) = viewer KB + kbLink + voisinage
  TaskPanel SANS toucher l'install (prouver la valeur d'abord) ; phase 3 = Python dans l'install (le
  plus risqué, en dernier). 6 décisions listées pour Rémi.
