outcome: >-
  Spec d'intégration Graphify écrite (docs/specs/graphify-kb.md, 384 l., Fable). Verdict clé :
  Graphify = 100% Python (MIT, pip graphifyy), MAIS son binaire ne génère pas (sous-cmds
  install/hook/benchmark) — la pipeline est orchestrée par l'AGENT via le skill ; sortie =
  graphify-out/graph.json (node-link NetworkX). Archi retenue : le dashboard LIT le JSON, l'agent
  GÉNÈRE → zéro Python dans les deps npm, jamais dans package.json, dégradation propre si absent.
  graph.json reste dans graphify-out/ (pas sous docs/), chemin configurable (kbGraph). Serveur :
  src/server/kb.ts + GET /api/kb. Rendu : layout force-directed maison (kbLayout.ts ~150l, précédent
  layoutTagGraph) + useZoomPan réutilisé + SVG façon TagGraph (pas dagre, pas l'iframe navy). UI =
  placement (b) confirmé : sous-onglet de la Vue Docs, toggle « Documents / Knowledge base » calqué
  ligne à ligne sur le segmented Columns/Graph de RoadmapView. Plan 4 phases, 1er slice ~1j (lecture
  seule + empty state pédagogique + dogfood sur le repo). 4 décisions listées pour Rémi (git de
  graphify-out, périmètre, libellé toggle, roadmapped kb).
