detail: >-
  Demande Rémi : intégrer Graphify (github.com/safishamsi/graphify, graphify.net — skill open-source
  qui transforme code+docs en knowledge graph interrogeable, Tree-sitter/NetworkX/Leiden) comme
  FEATURE du dashboard. Deux placements proposés : (a) onglet « kb » dans les tabs du haut, ou (b)
  sous-onglet dans Docs, toggle « Documents / Knowledge base » (comme colonnes/graph dans Roadmap —
  cf RoadmapView). Inconnues à trancher : Graphify est Python, Roadmapped React/Node → où vit le
  graphe (fichier généré dans le repo ?), comment on le génère (CLI/hook ?), dépendance Python
  acceptable ou réimplémentation ?, comment on rend/interroge le graphe côté dashboard, licence
  Graphify, périmètre du graphe (docs/tasks + code ?). Spec Fable = comprendre Graphify à fond +
  l'archi actuelle des tabs/views + proposer archi d'intégration, trancher UI (préférence Rémi =
  sous-onglet Docs), plan par phases + 1er slice minimal + effort/risques. SPEC AVANT BUILD.
