outcome: >-
  docs/specs/2026-07-08-feedback-mode.md rédigé (DRAFT). Résout le ruissellement de tickets
  (#140→#141→#146) SANS casser la traçabilité : (1) journal feedback[]{date,author,text,resolved}
  additif sur la tâche = capture sans ticket ; (2) PAS de nouveau statut (enum immuable) — une done
  avec feedback open est signalée (sitrep) ; (3) agir sur un retour même-périmètre = ROUVRIR
  (done→in_progress) + re-done avec commit, au lieu d'un quick-jumeau → git log garde chaque commit,
  la tâche porte le récit ; (4) le quick reste le défaut pour un périmètre nouveau. Impact CLI/MCP
  (feedback <id>), sitrep, UI panneau, skill/process-enforcement. Articulé avec la console #147.
  Décision de FOND (assouplir 'done=frontière') balisée pour Rémi. Découpage 5 sous-tickets. Sans
  tiering Fable.
