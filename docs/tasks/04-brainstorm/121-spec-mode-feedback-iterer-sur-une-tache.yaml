id: 149
title: "Spec — mode « feedback » : itérer sur une tâche sans créer des tickets à l'infini"
status: done
tags:
  - spec
  - data-model
detail: >-
  Problème constaté par Rémi : itérer sur le MÊME sujet fait ruisseler des tickets (#140→#141→#146…)
  alors que c'est une seule chose en cours de finition. Spécifier un « mode feedback » qui capte les
  retours sur une tâche SANS créer un nouveau ticket à chaque fois. À explorer/trancher : le modèle
  (nouveau statut type in_review/needs_feedback ? un journal de feedback horodaté attaché à la tâche
  — items {date, auteur, texte, résolu} ? des sous-items légers distincts des subtasks ?) ; le cycle
  de vie (une tâche done qui reçoit un retour repasse-t-elle en feedback plutôt que de spawner un
  quick ? frontière avec la règle actuelle « done = frontière, un retour = un quick » de
  process-enforcement — CE mode assouplit-il cette règle et dans quels cas ?) ; l'UI (où saisir un
  feedback dans le panneau, comment le voir/résoudre) ; l'impact CLI/MCP/skill (une commande
  feedback <id> "…" ? comment l'agent lit et traite les feedbacks ouverts) ; l'articulation avec la
  console action-tracking de #147. Livrable : docs/specs/2026-07-08-feedback-mode.md + découpage en
  sous-tickets (difficulté + tier d'agent). Confié à Fable 5. Zéro code avant approbation.
