outcome: >-
  Étude livrée (docs/specs/2026-07-18-tags-etude.md). Les 3 hypothèses confirmées avec preuves : (a)
  skill 100% optionnel sur les tags, (b) schéma MCP tags nu (sans description/vocabulaire,
  mcp-server.mjs:297/349/433) et vocabulaire invisible pour l'agent, (c) payoff dashboard-only sauf
  la convention debt (load-bearing, render.ts:222). Données : 86 tags uniques, 50% à ≤3 usages. RECO
  : FIX (option C, coût S) — description dynamique du param tags au boot MCP (top-N en usage) + 1
  ligne nudge dans le skill ; kill rejeté (retrait L + remplaçant debt requis + perte TagGraph).
  Décision finale à Rémi ; 3 titres de tickets de suite prêts dans le doc.
