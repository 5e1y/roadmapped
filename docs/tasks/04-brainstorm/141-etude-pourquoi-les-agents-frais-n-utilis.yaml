detail: >-
  Constat Rémi : sur d'autres repos utilisant Roadmapped, les agents frais taggent peu leurs
  tickets. Hypothèses à vérifier : (a) le skill n'exige jamais de tags → un agent en économie de
  tokens ne remplit que l'obligatoire ; (b) vocabulaire libre sans feedback — l'agent ne voit jamais
  les tags existants (ni schéma MCP add, ni erreur) donc s'abstient ; (c) aucun payoff visible —
  seul consommateur = TagGraph que l'agent ne voit jamais. Question à trancher d'abord : les tags
  méritent-ils d'exister ? Si oui → fix probable pas cher : injecter les tags en usage dans la
  description du tool MCP add + une ligne dans le skill. Si non → retrait complet façon archive
  (#154). Livrable : décision documentée + tickets de suite.
