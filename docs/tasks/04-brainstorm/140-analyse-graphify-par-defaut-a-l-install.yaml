detail: >-
  Décision Rémi (2026-07-12) : Graphify n'est PAS un opt-in, c'est le CŒUR de Roadmapped — il réduit
  ~70% la conso de tokens en aidant les agents à naviguer la codebase. Le visualiseur est un gadget
  ; la vraie valeur = le graphe comme couche de navigation par réflexe pour tout agent. Reverser
  #322 (défaut Non → défaut OUI/auto). Analyse Fable en 2 volets :


  VOLET A — INSTALL PAR DÉFAUT (robuste, le plus léger possible). Concevoir l'install auto de
  Python+Graphify à `roadmapped init` PAR DÉFAUT (plus de prompt défaut-Non). Mécanisme recommandé à
  évaluer : `uv` (installe Python géré + `uv tool install graphifyy` en une passe, rapide). Chiffrer
  les tailles RÉELLES (uv binaire + CPython managé + graphifyy env, sans Leiden) — Rémi estime ~30
  Mo « rien du tout vs les gains », vérifier l'ordre de grandeur réel et l'assumer. Bootstrap uv si
  absent. Cross-platform (mac/linux/win). Fallbacks (uv→pipx→venv, système Python). Reste NON
  bloquant si vraiment impossible (rare), mais le DÉFAUT = ça s'installe. Toujours pas de génération
  auto du graphe par install.mjs (acte d'agent) — MAIS voir volet B pour déclencher la 1re
  génération au plus tôt. Distinguer bundle-npm (lourd, écarté) vs install-init-via-uv (retenu).


  VOLET B — ANCRAGE PROFOND (le vrai sujet). Auditer HONNÊTEMENT à quel point Graphify est
  réellement câblé pour que les agents l'utilisent : le skill SKILL.md (1 seul bloc aujourd'hui —
  insuffisant ?), les 3 outils MCP (kb_neighborhood/search/node), le CLI `roadmapped kb`. Vérifier
  la vraie mécanique d'économie de tokens de Graphify (comment il fait, le ~70% est-il étayé — lire
  les sources graphify). Proposer un plan pour que l'agent passe par le graphe PAR RÉFLEXE : ex.
  consigne forte dans le skill (« avant de grep/lire, interroge le graphe »), workflow
  take→kb_neighborhood systématique, 1re génération du graphe déclenchée tôt (setup/1re session),
  rafraîchissement, exposer le MCP graphify natif (query_graph sémantique) en plus des outils
  task-centrés, garde-fous quand le graphe manque/périmé. Livrer : constats + recommandations
  priorisées + ce qui devient des tickets d'implémentation. SPEC/ANALYSE, pas de code. Écrire dans
  docs/specs/graphify-kb.md (section « Ancrage & install par défaut ») ou un nouveau doc.
