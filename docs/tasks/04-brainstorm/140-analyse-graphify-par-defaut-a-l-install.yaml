outcome: >-
  Analyse livrée (docs/specs/graphify-anchoring.md, 373 l., supersede §2.2b/2.3/5.2/9 de
  graphify-kb.md). VOLET A install par défaut : chaîne uv-first — uv présent → uv tool install
  graphifyy (uv télécharge un CPython géré si absent, cross-platform vérifié) ; uv absent →
  installer uv via asset GitHub épinglé+checksum dans ~/.roadmapped/bin (pas de curl|sh) ; puis pipx
  ; puis venv système. Chemins absolus en config (kb.uvBin/pythonBin/graphifyBin). Tailles mesurées
  : dev avec uv ~28Mo (le « ~30Mo » de Rémi exact, cas nominal), machine nue ~85Mo download/250Mo
  disque (pire cas assumé, one-shot, 0 dans npm ; bundle-npm reconfirmé rédhibitoire). Opt-OUT
  (--no-kb + kb:false config) au lieu d'opt-in ; skip si CI. 1re génération : install.mjs sans agent
  → 3 déclencheurs (setup demande 1×, absence de graph.json = marqueur porté par une ligne KB dans
  sitrep, nudge dans take/brief). VOLET B ancrage : ~70% = « 71.5× fewer tokens/query » claimé par
  le README Graphify (corpus 52 fichiers) → honnêtement ~70% des tokens d'EXPLORATION
  (localiser/tracer/re-lire), pas la session (l'agent lit ce qu'il édite) ; atouts réels =
  régénération code-only 0 token LLM (AST) + graphe persistant. CONSTAT : plomberie complète
  (kb.ts/kbLink/kbQuery, 3 MCP, CLI, graphe committé) mais RIEN load-bearing — take/brief/sitrep
  ignorent la KB, skill 1 bloc hors-cycle, Golden rule travaille CONTRE, MCP natif graphify (7
  outils serve.py) non branché. Recos : P0 = voisinage KB embarqué d'office dans take/brief +
  install défaut ; P1 = règle graph-first SKILL.md + amender Golden rule + enregistrer MCP natif
  graphify ; P2 = garde-fous fraîcheur (sitrep stale, nudge done, kb refresh AST) + mesure dogfood.
  11 tickets proposés (§B.4).
