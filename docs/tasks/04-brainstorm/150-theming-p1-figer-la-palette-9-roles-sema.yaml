  l'allègement. 4 RADII : Interactive=6px (fusionne l'ancien 4/6), ListItem=0 (rangées collées par
  défaut, thémable), Surface=8px, Round=9999. 6 SPACING : XS4/S8/M12/L16/XL24 + ListGap=0 (thémable
  pour listes en cartes séparées). Mapping documenté dans design.md §1 (contrat de theming). Gate
  levée : Rémi a défini les tokens.
