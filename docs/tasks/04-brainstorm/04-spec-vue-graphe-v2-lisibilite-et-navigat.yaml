detail: >-
  Brainstorm avec Rémi pour une visualisation graphe digne d'un vrai outil : routage des arêtes plus
  lisible (croisements minimisés), zoom/pan, mise en évidence du chemin amont/aval d'une tâche au
  survol ou au clic, regroupement visuel par section, tenue sur de grands graphes (50+ tâches), état
  visuel des milestones bloquants (dépend de la spec #6 si elle aboutit avant). Livrable :
  docs/specs/AAAA-MM-JJ-graph-v2.md approuvée par Rémi, puis tâches d'implémentation. Zéro code
  avant approbation.
