outcome: >-
  Bug scroll Backlog corrigé (Fable). Cause exacte : les <span sr-only> des EpicRow (#135) sont en
  position:absolute (Tailwind sr-only) ; sans ancêtre positionné dans la liste du Backlog, leur
  containing block remontait à <html>, échappant au clip du scroller interne → scrollHeight gonflé à
  ~1998px, la molette au-dessus du radar scrollait la fenêtre dans le vide (scrollY montait à
  ~1098). Fix 2 niveaux : EpicRow passée en relative (sr-only remplacé par aria-label sur le
  trigger) + scroller interne du Backlog en relative (défense structurelle : plus aucun absolu ne
  s'échappe). Colonnes/Graphe ne buggaient pas (ancêtres déjà positionnés).
verification: >-
  tsc clean, 290 tests verts, build OK, boot HTTP 200. Mesuré en headless par Fable AVANT/APRÈS :
  docSH 1998→900, molette radar scrollY 1098→0. Bug confirmé disparu.
