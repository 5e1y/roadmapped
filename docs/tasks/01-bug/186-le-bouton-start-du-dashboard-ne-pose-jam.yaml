detail: >-
  Audit bugs #358 (HAUT-2, docs/audit-bugs-2026-07.md). Le bouton Start du dashboard émet PATCH
  {status:'in_progress'} → updateTask, qui date completedAt mais n'a AUCUNE branche startedAt
  (taskWrites.ts:553). Seuls CLI/MCP passent par startTask. Résultat : un ticket démarré depuis l'UI
  a son âge in_progress calculé depuis createdAt (le bug que #82 visait, non couvert côté
  dashboard). Fix : dans updateTask, sur passage à in_progress sans startedAt explicite et si
  raw.startedAt absent, poser startedAt = now() (parité avec la branche completedAt/doneTask). Test
  : PATCH in_progress via updateTask → startedAt posé.
