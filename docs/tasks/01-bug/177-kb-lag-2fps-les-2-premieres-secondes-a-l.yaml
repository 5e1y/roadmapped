detail: >-
  Retour Rémi : à l'ouverture du graphe KB (869 nœuds) ça lague (~2fps) pendant ~2s, malgré la sim
  optimisée #316 (le headless CDP ne peint pas comme un vrai navigateur → le montage simultané des
  869 <g> SVG + 1ers ticks est lourd en réel). Solution : ne pas monter/simuler les 869 nœuds d'un
  coup — les faire ENTRER progressivement/aléatoirement au lancement (staggered mount, ex. par lots
  sur les premières frames, ordre aléatoire déterministe ou hubs d'abord), pour que la génération
  reste fluide dès la 1re seconde. Cohérent avec la génération « qui s'écarte » de #316 (les nœuds
  rejoignent la sim au fur et à mesure de leur entrée). reduced-motion : tout d'emblée (inchangé).
  Mesurer le fps réel de la 1re seconde. Ne pas régresser les features KB.
