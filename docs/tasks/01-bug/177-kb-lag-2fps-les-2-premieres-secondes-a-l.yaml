outcome: >-
  Lag d'ouverture du graphe KB résorbé (Fable, mesuré CDP). Cause : montage simultané des 869 <g>
  SVG + sim complète dès la 1re frame. Fix = apparition PROGRESSIVE : nœuds triés hubs d'abord
  (orderByDegree, degré desc + id, déterministe, 0 Math.random) ; la sim démarre sur un préfixe
  actif de 90 nœuds, les autres ne sont NI dans placed/DOM NI dans les forces
  (répulsion/ressorts/intégration bornés au préfixe, links triés par extrémité max) ; la boucle rAF
  fait entrer +110 nœuds tous les 8 ticks (cadence en TICKS pas frames → ~1s même à 30fps) ; chaque
  entrant spawne au barycentre de ses voisins déjà entrés + réchauffe (MORPH_ALPHA) → rejoint la
  génération qui s'écarte de #316. onReveal = 1 render React par lot (8 au total) monte les nouveaux
  <g>. Caméra : auto-fit sur la bbox des entrés (fit progressif). reduced-motion : pipeline statique
  inchangé. Petits graphes (≤90) : pas de stagger. revealTarget pur + testé.
verification: >-
  npx tsc --noEmit clean ; npx vitest run 543/543 (dont
  initialReveal/reveal/revealTarget/déterminisme/morph-mid-reveal). CDP vrai graphe : DOM
  90→420→640→869 <g> entre 56ms et ~680ms, 104 frames rAF dans la 1re seconde, 0 long task avant 2s
  (caveat : headless non throttlé ~100fps, le navigateur de Rémi = juge final).
release: 0.1.0
