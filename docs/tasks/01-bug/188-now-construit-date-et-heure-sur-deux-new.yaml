outcome: >-
  now() horodate sur UNE seule instance Date (audit #358). Fonction pure localStamp(d) exportée :
  date ET heure lues sur le même d — l'ancien code composait la date via today() (un new Date()) et
  l'heure via un AUTRE new Date(), décalant l'horodatage de ~24h à la frontière de minuit. Un seul
  paramètre Date rend le bug structurellement impossible à réintroduire. today() interne supprimé
  (seul now() l'utilisait).
