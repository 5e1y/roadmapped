heat: 40
detail: >-
  Audit bugs #358 (MOYEN, docs/audit-bugs-2026-07.md). La fonction now() (taskWrites.ts) compose la
  date et l'heure à partir de deux appels new Date() séparés → à la frontière de minuit,
  completedAt/updatedAt peut être décalé de ~24h. TaskPanel fait la même composition correctement
  (un seul Date). Fix : un seul new Date() capturé, formaté en une passe. Test : mock horloge sur
  23:59:59.999.
