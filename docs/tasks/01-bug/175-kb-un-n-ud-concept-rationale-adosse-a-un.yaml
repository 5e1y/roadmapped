commit: 9cf4b52
outcome: >-
  Routage source d'un nœud KB corrigé : openKbNodeSource ouvrait la Vue Docs seulement si
  file_type==='document'. Or Graphify pose file_type sur la NATURE du nœud
  (concept/rationale/document), pas du fichier — donc un nœud concept/rationale adossé à un
  docs/*.md tombait en OS-reveal. Condition changée : tout node.sourceFile en docs/*.md →
  OPEN_DOC_EVENT, quel que soit file_type ; le reste (code/autre) → reveal. Bug révélé par le vrai
  graphe (82 nœuds concept/rationale).
verification: npx tsc --noEmit exit 0. Changement de condition d'une ligne, aucun autre code touché.
release: 0.1.0
