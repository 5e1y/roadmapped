id: 274
title: "Multi-dashboard : le port annoncé/ouvert est faux quand 5173 est pris → ouvre le mauvais repo"
status: done
tags:
  - ui
  - dashboard
  - multi-repo
detail: >-
  serve.ts listenWithRetry : le callback de server.listen(port, cb) reste attaché comme listener
  'listening' quand le port échoue (EADDRINUSE). Au bind réussi du port suivant, TOUS les callbacks
  accumulés se déclenchent, le premier (le port échoué) résout la Promise → on annonce/ouvre le
  mauvais port. Symptôme : lancer le dashboard de ZineKit alors que 5173 sert déjà Roadmapped →
  ZineKit bind bien 5174 mais imprime/ouvre 5173 → le navigateur affiche Roadmapped. Fix :
  n'utiliser que server.once('listening') + lire server.address().port (port réel), retirer le
  listener 'listening' pendant retry.
