commit: 966d560
outcome: >-
  Bug multi-dashboard corrigé : le dashboard d'un 2e repo annonçait/ouvrait le mauvais port → le
  navigateur affichait le mauvais repo (symptôme exact de Rémi : lancé depuis ZineKit, ça ouvrait
  Roadmapped). Cause : dans serve.ts listenWithRetry, le callback passé à server.listen(port, cb)
  reste attaché comme listener 'listening' même quand le port échoue (EADDRINUSE) ; au bind RÉUSSI
  du port suivant, tous les callbacks accumulés se déclenchent et le premier (port échoué, ex. 5173)
  résout la Promise → on annonçait 5173 alors que le serveur écoutait sur 5174. Fix : gérer
  'listening'/'error' à la main (server.once + retrait explicite du listener 'listening' pendant le
  retry) et résoudre avec le port RÉELLEMENT lié via server.address().port (pas la variable
  capturée). listenWithRetry exporté + 2 tests de régression (saute le port occupé & annoncé==réel ;
  rejette si plage pleine).
verification: >-
  Repro live AVANT fix : Roadmapped sur 5173 (prod), lancement dashboard données ZineKit → imprimait
  « http://localhost:5173/ (ZineKit) » alors que 5174 servait ZineKit (donc navigateur →
  Roadmapped). APRÈS fix (même scénario) : imprime « http://localhost:5174/ (ZineKit) » = le port
  qui sert réellement ZineKit. tsc 0 ; 439 tests verts (+2 : serve.test.ts vérifie l'invariant
  port-annoncé==port-lié via de vrais sockets, et le rejet plage pleine).
release: pre-release
