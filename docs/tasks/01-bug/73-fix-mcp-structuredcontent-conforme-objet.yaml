size: S
detail: >-
  Deux bugs révélés au premier usage réel dans Claude Code (invisible en JSON-RPC brut, #91). Bug 1
  (bloquant) : next/list/roadmap passent un ARRAY comme structuredContent — la spec MCP exige un
  objet, le SDK client rejette (-32602) ; take avec file vide passe null (même famille). Bug 2
  (dégradant) : quand structuredContent est présent, Claude Code n'affiche QUE lui et jette le
  content texte — sitrep perd ses 30 lignes, brief devient ≡ show (extraits de refs/fraîcheur perdus
  = la valeur token-economy). Fix : n'émettre structuredContent que quand l'objet EST la charge
  utile (tools d'écriture → tâche résultante, validate) ; les tools texte-first (sitrep, brief,
  next, take, list, roadmap) renvoient le texte seul ; done remonte les warnings DANS le structured
  ({task, warnings}) pour ne pas les perdre. Fini quand : les 14 tools répondent dans une session
  Claude Code réelle sans -32602, sitrep/brief affichent leur texte dense, tests MCP mis à jour +
  garde « structuredContent = objet ou absent » sur tous les tools, suite + build verts.
