commit: "0769743"
outcome: >-
  Deux causes corrigées : (a) POST /api/update accepte le restart quand le package-lock a bougé
  depuis le boot du serveur — l'autoUpdate #294 installait en arrière-plan et le re-check répondait
  409 « à jour » alors que le process servait encore l'ancienne version ; (b) restartWithUpdate
  repasse le port réellement bindé (--port) au dashboard relancé — il scannait depuis 5173 et
  rebindait ailleurs que le port sondé par l'onglet (dérive rendue systématique par #330 qui libère
  les ports bas). Release 0.2.3 publiée.
verification: >-
  Reproduit PUIS revérifié e2e en sandbox (host-test, install github réelle) : avant fix, clic → 409
  et serveur revenu sur 5173 au lieu de 5180 ; après fix (install #0769743, autoUpdate vers
  4a2e000), clic → 200 et serveur revenu sur 5180. 601/601 tests (2 nouveaux sur restartCommand),
  tsc propre, CI publish success, npm latest=0.2.3.
release: 0.2.3
