detail: >-
  Batch Rémi (2026-07-07). (1) Le dropdown Teams disparaît des headers Roadmap ET Backlog
  (inutile/cassé en roadmap) — le radar reste le pilote du filtre team côté Backlog ; la Roadmap ne
  filtre plus par team du tout (retirer la logique des Colonnes et du Graphe pour qu'un filtre posé
  au radar ne filtre pas silencieusement la roadmap). (2) Vue Docs : date de création affichée à
  côté de chaque fichier dans le flanc gauche (stat côté serveur, DocNode.createdAt, rendu mono
  discret). (3) BUG chevrons : dans tous les dépliants fermés le chevron pointe à GAUCHE au lieu de
  la droite — corriger le glyphe (trinil) pour pointer à droite fermé, rotation vers le bas ouvert.
  Fini quand : headers sans dropdown team, dates visibles dans l'arbre, chevron fermé → droite
  constaté.
