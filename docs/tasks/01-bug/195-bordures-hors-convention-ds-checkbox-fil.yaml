id: 425
title: >-
  Bordures hors convention DS : checkbox FilterMenu (border réelle) + input search KB (chrome natif
  du navigateur)
status: done
tags:
  - ds
detail: >-
  2 cas confirmés avant audit plus large : (1) ViewHeader.tsx:160-161, la checkbox du menu de filtre
  utilisait 'border' + 'border-accent'/'border-border' (vraie bordure CSS, largeur DOM) au lieu du
  ring-inset/box-shadow imposé par la doctrine (#395 : jamais de vraie border). Corrigé en ring-1
  ring-inset ring-accent/ring-border. (2) KbView.tsx:67-72, l'input de recherche KB est en
  type="search" sans appearance-none : le chrome natif du navigateur (WebKit notamment) impose sa
  propre bordure/forme, invisible dans le code mais bien réelle à l'écran, en plus du ring-border
  applicatif — d'où l'impression d'une bordure en dur. Corrigé en ajoutant appearance-none.
refs:
  - src/components/ViewHeader.tsx
  - src/components/KbView.tsx
