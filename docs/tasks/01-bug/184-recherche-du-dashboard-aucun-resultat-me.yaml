outcome: >-
  ROOT CAUSE démontrée par tests rouges : la recherche matchait, mais les résultats étaient DÉMONTÉS
  du DOM — (1) une tâche dans un epic est rendue dans un EpicRow replié par défaut, et le
  Collapsible.Panel Base UI démonte ses enfants fermé → titre matché absent du DOM (203/330 tâches
  ont un epic, d'où le « aucun résultat » quasi systématique) ; (2) gardes d'état vide sur les
  tableaux bruts open/done au lieu des items rendus → « Nothing open » malgré un match réel. Fix
  minimal : prop forceOpen sur EpicRow (dépliage forcé LE TEMPS du filtre, préférence persistée
  intacte), propagation filtered aux ReleaseSection (#342) et ListItemRow, gardes corrigées sur
  openItems/doneItems, filtre type inclus dans hasFilters. Surface KB examinée et saine (elle indexe
  le code, pas les tickets — comportement attendu).
verification: >-
  5 tests Backlog.test.tsx dont 2 rouges avant fix (terme dans epic replié, terme done dans epic
  incomplet) — verts après. tsc clean, suite complète 627/627 dans main post-merge, build OK, bundle
  unique reconstruit depuis les sources fusionnées.
