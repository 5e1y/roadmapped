title: Radar — cartes HTML à taille fixe et traits non-scalants (lisibilité)
status: done
tags:
  - ux
  - design
  - bug
detail: >-
  Retour Rémi (2026-07-07, capture) : à petite taille le radar reste illisible — cause racine : les
  cartes vivent DANS le SVG, donc leur typo rétrécit proportionnellement, et les traits (strokeWidth
  scalé) s'évanouissent. Fix structurel : le SVG ne garde que la géométrie (anneaux, axes, polygone,
  points) avec vector-effect non-scaling-stroke (traits constants à toute échelle) ; les cartes de
  teams deviennent des BOUTONS HTML positionnés en % au-dessus (police 12px FIXE quelle que soit la
  taille du radar, ancrage directionnel vers l'extérieur pour ne jamais chevaucher les anneaux ni
  sortir du cadre). Hover/sélection/clic-vide inchangés. Fini quand : capture du radar en colonne
  420px avec cartes à 12px réels et anneaux visibles.
