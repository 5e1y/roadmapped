id: 428
title: >-
  ZoomControls : coins arrondis de chaque segment visibles individuellement sur les thèmes à radius
  élevé
status: done
tags:
  - ds
detail: >-
  Screenshot fourni par Rémi (barre −/Fit/100%/+ des canvas KbGraph/RoadmapGraph). Chaque Button
  (variant ghost, composant unifié #419/#420) applique SA PROPRE rounded-interactive, et le
  conteneur ne fait qu'un overflow-hidden rounded-interactive autour du tout — les coins internes de
  chaque segment restent visibles individuellement au lieu de former une seule pilule cohérente avec
  seulement les 2 coins extérieurs arrondis. Très visible sur les thèmes à radius-interactive élevé
  (cursor 16px, github 12px), presque invisible en dessous (base/codex 6px, claude 8px) — d'où "un
  peu bugué sur les thèmes arrondis". Fichier : src/components/ZoomControls.tsx. Aucun autre groupe
  de boutons segmentés similaire ailleurs dans l'app (vérifié) — portée isolée à ce composant, mais
  si le fix introduit une capacité générique sur Button (variant de coin, prop pour désactiver le
  radius individuel...), la documenter clairement pour réutilisation future plutôt que de la cacher
  dans ZoomControls seul.
