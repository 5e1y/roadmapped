commit: 345fcb2
outcome: >-
  Cause confirmée par preuve DOM (getComputedStyle via CDP) : chaque segment portait son propre
  border-radius (rounded-interactive inconditionnel de Button), et un box-shadow inset (les
  séparateurs 1px) suit la border-box ARRONDIE de l'élément qui le porte — chaque segment dessinait
  sa propre silhouette de pilule au lieu d'une barre continue. overflow-hidden du conteneur ne
  clippe que hors de ses propres bounds, ne corrige rien à l'intérieur. Fix : nouveau prop Button
  rounded?:boolean (défaut true) qui OMET rounded-interactive de la classe interne quand false —
  fiable car une seule règle border-radius possible (pas de dépendance à l'ordre de cascade
  Tailwind). Appliqué rounded={false} aux 4 segments de ZoomControls ; le conteneur
  (rounded-interactive + overflow-hidden) reste seul responsable des 2 coins extérieurs. Piège
  annexe découvert et évité : le scanner Tailwind lit aussi les commentaires, un doc-comment citant
  littéralement l'utilitaire zéro-rayon l'aurait fait émettre par erreur.
verification: >-
  Preuve empirique AVANT/APRÈS sur cursor (16px, le plus flagrant) et base (6px) via Chrome
  headless/CDP réel sur le dev server : border-radius 0px sur les 4 segments après fix (vs 16px/6px
  avant), séparateurs redevenus des traits verticaux droits pleine hauteur. tsc -b clean, suite
  complète 58/58 fichiers 742/742 tests verts.
release: 0.3.0
