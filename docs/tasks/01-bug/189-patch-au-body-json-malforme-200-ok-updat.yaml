detail: >-
  Audit bugs #358 (MOYEN, docs/audit-bugs-2026-07.md). Un PATCH dont le body JSON est malformé ne
  rejette pas : il retombe sur un update vide qui bumpe quand même updatedAt → badge NEW/toast live
  déclenché sans aucune modification réelle. Fix : rejeter (400) un body qui ne parse pas / n'a
  aucun champ patchable, ne pas toucher updatedAt si le patch est vide. Test : PATCH body='{' → 400,
  updatedAt inchangé.
