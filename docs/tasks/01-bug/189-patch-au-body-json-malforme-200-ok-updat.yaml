outcome: >-
  PATCH malformé/no-op ne bumpe plus updatedAt (audit #358). Double défense : (1) patchActive
  compare la forme canonique dumpTask AVANT/APRÈS mutate — un patch sans effet (body vide, valeur
  identique) retourne ok SANS réécrire ni bumper updatedAt (plus de badge NEW/toast live fantôme,
  toute source confondue) ; (2) readJsonBody distingue body absent (null, légitime pour POST
  bodyless comme /api/update) de body présent-mais-illisible (sentinelle MALFORMED_BODY) → le
  handler répond 400 au lieu d'un update vide silencieux.
verification: >-
