detail: >-
  Deux choses sur le chevron d'expand. (1) BUG : cliquer PILE sur l'icône chevron d'un epic ne
  déplie pas — le SVG chevron (décoration non positionnée) intercepte le clic au lieu de le laisser
  filer au calque Collapsible.Trigger (absolute inset-0) posé dessous (EpicRow). Fix :
  pointer-events-none sur les décorations (chevron toujours décoratif, le toggle vit dans le
  trigger). (2) DESIGN : unifier le chevron des sous-tâches (TaskRow, bouton rounded px-0.5
  hover:bg-neutral-200) sur le chevron NU des epics. Retirer la boîte de hover, garder la zone
  cliquable.
