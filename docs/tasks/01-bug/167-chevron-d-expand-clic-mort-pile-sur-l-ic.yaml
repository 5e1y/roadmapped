outcome: >-
  Deux fixes sur le chevron d'expand. (1) BUG corrigé : cliquer pile sur l'icône chevron d'un epic
  ne dépliait pas — le SVG chevron (décoration non positionnée) captait le clic au lieu de le
  laisser filer au calque Collapsible.Trigger absolute inset-0 dessous. Fix : pointer-events-none
  par DÉFAUT sur le glyphe Chevron (glyphs.tsx) — il est toujours décoratif, le toggle vit dans un
  trigger, donc bénin dans les 5 usages (TaskRow, EpicRow, EpicBand, DocsTree, RoadmapColumns,
  RoadmapGraph) — + pointer-events-none sur les autres décorations nues d'EpicRow (glyphe epic
  wrappé, spans compte/barre) pour que TOUTE la ligne déplie sauf le nom éditable. (2) DESIGN unifié
  : le chevron des sous-tâches (TaskRow) perd sa boîte de hover (rounded + hover:bg-neutral-200)
  pour matcher le chevron nu des epics ; zone cliquable gardée (self-stretch px-0.5), le survol de
  la ligne fait l'affordance comme sur un epic.
