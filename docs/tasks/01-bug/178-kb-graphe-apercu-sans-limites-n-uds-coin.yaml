heat: 86
detail: >-
  Retour Rémi (capture) : on peut envoyer des nœuds « hors zone », NOK. Deux bornes en cause : (1)
  kbSim borne les positions dans [PAD, side−PAD] d'une boîte de contenu FIXE (côté ∝ √n) → avec les
  params plus écartés (repulsion/spring plus forts) les nœuds tapent le mur et s'empilent au bord ;
  (2) useZoomPan.clampPan borne le pan (KEEP_VISIBLE) → on ne peut pas naviguer librement pour
  suivre un nœud éloigné. FIX = aperçu sans limites : la sim n'est plus contrainte dans une boîte
  dure (laisser les nœuds s'écarter librement ; la caméra fitBox suit la vraie bbox vivante, déjà le
  cas), ET pan libre (désactiver clampPan) — MAIS en OPTION propre à la vue KB : useZoomPan est
  aussi utilisé par RoadmapGraph (src/components/RoadmapGraph.tsx) qui doit garder son clamp.
  Ajouter un flag (ex. useZoomPan({unbounded:true}) ou fitBox/pan sans clamp) activé seulement par
  KbGraph. Garder zoom/fit fonctionnels. Ne pas régresser RoadmapGraph.
refs:
