id: 319
title: >-
  KB graphe : aperçu SANS LIMITES — nœuds coincés « hors zone » (boîte PAD fixe) + pan borné
  (clampPan) ; libérer les deux, en option KB (ne pas toucher RoadmapGraph)
status: done
