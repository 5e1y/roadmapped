outcome: >-
  Aperçu KB sans limites (Fable, vérifié CDP). (a) Positions : clamp dur PAD retiré de iterate()
  (constante PAD supprimée) → les nœuds s'étendent librement, la boîte √n ne sert plus qu'au centre
  de gravité/taille canvas ; svg passé en overflow-visible pour dessiner hors boîte ; le fit
  (initial/onFrame/bouton Fit) suit la bbox VIVANTE (nodesBox). (b) Pan : clampPan(..., unbounded)
  renvoie la transform telle quelle si unbounded ; useZoomPan(w,h,{unbounded?}) propage via ref
  (apply/fitBox/centerOn). Seul KbGraph passe {unbounded:true} ; RoadmapGraph
  (useZoomPan(layout.width,layout.height) L242) INCHANGÉ → reste borné (ses 7 tests passent). Zoom
  toujours borné [0.2,2.5]. CDP : nœuds étalés sans empilement au mur (0 sur l'ancien clamp), pan à
  tx 5411 là où l'ancien bornait à 1392.
verification: >-
