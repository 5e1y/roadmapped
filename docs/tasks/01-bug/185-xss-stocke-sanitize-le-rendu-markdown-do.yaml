  - xss
heat: 85
detail: >-
  Audit sécurité #356 (HAUTE-1, docs/audit-securite-2026-07.md). marked 18.0.5 rend du HTML brut
  injecté via dangerouslySetInnerHTML dans Markdown.tsx:33 et DocsView.tsx:183 — un <img onerror=…>
  dans un detail/outcome (écrit par un agent) ou un docs/*.md (repo cloné) exécute du JS dans
  l'origine du dashboard, qui a un accès API local non authentifié. Fix : sanitizer la sortie de
  renderMarkdown (DOMPurify, ou marked + allowlist), retirer les commentaires « pas de surface XSS
  ». Test : payload <img onerror> / <script> neutralisé. Vérifier que le markdown légitime (liens,
  code, headings ancrés) reste intact.
refs:
  - src/components/Markdown.tsx
  - src/components/DocsView.tsx
