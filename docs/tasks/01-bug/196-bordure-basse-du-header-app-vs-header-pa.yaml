id: 427
title: "Bordure basse du header app vs header panneau : léger décalage vertical (~1-2px perçu)"
status: done
tags:
  - ds
detail: >-
  Rémi perçoit un décalage de ~1-2px entre le trait bas
  (shadow-[inset_0_-1px_0_var(--color-border)]) du header de l'app (ViewHeader.tsx) et celui du
  header de panneau (SidePanel.tsx). Analyse préalable (à vérifier, pas à prendre pour acquis) : les
  deux headers utilisent la même recette px-l py-s + shadow-[inset_0_-1px_0_var(--color-border)].
  Depuis #420, le search input de ViewHeader (py-s + text-xs leading-none = 28px) et le Button (p-s
  + icône/texte 12px = 28px carré) ont le même gabarit — sur le papier, les deux headers devraient
  calculer à 44px (8 padding + 28 contenu + 8 padding) et donc s'aligner parfaitement. Le décalage
  perçu reste donc à investiguer précisément (rendu réel, pas seulement le calcul sur papier).
refs:
