detail: >-
  Bug découvert en vérifiant le guide (#10) : le --help promet « "null" = remettre un champ à null »
  mais pour les champs LISTE, update --tags null crée un tag littéral « null » (seuls les champs
  scalaires et --depends-on/--milestone honorent null). Cause : cmdUpdate passe les listes par
  splitList sans le traitement nullable. Fix : dans cmdUpdate (scripts/task.mjs), traiter la valeur
  "null" des champs liste comme [] (parité avec --depends-on null). TDD : test rouge d'abord
  (updateTask est déjà couvert — le bug est dans le parsing CLI, tester la fonction de parsing
  extraite ou à défaut un test d'intégration du CLI en sandbox). Mettre à jour la section 4 et la
  FAQ du guide (docs/guide.md documente le contournement --tags '' — le simplifier une fois le fix
  livré). Fini quand : update --tags null écrit tags: [] dans le YAML relu.
