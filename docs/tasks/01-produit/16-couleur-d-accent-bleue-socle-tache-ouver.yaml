detail: >-
  Introduire UN bleu d'accent dans la palette monochrome (décision Rémi 2026-07-07, remplace « seule
  couleur tolérée : un vert discret » de la spec V2). Socle : token --color-accent dans index.css
  (@theme Tailwind 4) pour obtenir les utilitaires text-accent/bg-accent/border-accent — jamais de
  bleu en dur dans les composants. Usage n°1 : LA TÂCHE OUVERTE dans le side panel doit se repérer
  d'un coup d'œil dans les trois vues — Backlog (ligne surlignée), Roadmap Colonnes (carte bordée
  accent) et Graphe (carte bordée accent). L'id de la tâche ouverte vient de usePanel().top. Règle
  d'usage : le bleu reste RARE (sélection active, points d'attention) pour garder sa force — le
  reste demeure monochrome. Respect Base UI : la couleur s'applique par classes sur les composants
  existants, pas de composant nouveau. Fini quand : une tâche ouverte est visuellement traçable dans
  les 3 vues (captures Playwright), aucune couleur en dur hors token, npm run test + build verts.
