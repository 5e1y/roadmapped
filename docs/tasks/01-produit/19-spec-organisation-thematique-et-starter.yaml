  DÉCISION RÉMI (2026-07-07, après débat) : jalons FIXES formant la séquence universelle d'un
  lancement produit — Idea Stage → Initial Stage → Identity Stage → Build Stage → GTM Stage → Launch
  Stage → Scale Stage → Mature Stage (référence visuelle : docs/assets/refs/inspo-stages-*.png, app
  cloud concurrente) — COMBINÉS à une dimension transverse « team » par tâche : Marketing, Sales,
  Support, Operations, Finance, Legal, Engineering, Design. Le stage dit QUAND (colonne de roadmap),
  la team dit QUI. Objectif : pousser l'utilisateur à mener un vrai projet d'entreprise, pas juste
  du code. S'ajoutent : skills /roadmaped de stratégie de lancement et docs de best practices par
  domaine livrées à l'install (converge avec spec #12 distribution). À trancher en spec : rigidité
  des stages (validation stricte vs défaut d'init), team obligatoire ou nullable + sort du champ
  zone, migration du backlog existant (mapping 5 sections → 8 stages), rendu des stages vides,
  impact CLI/validate/skill/dashboard. Livrable : docs/specs/AAAA-MM-JJ-stages-teams.md approuvée
  par Rémi, puis découpage. Zéro code avant approbation.
