detail: >-
  Ajouter un champ optionnel outcome (string ou null, défaut null) au schéma de tâche : une phrase
  orientée utilisateur décrivant ce que la tâche a livré (« Le CLI supporte l'archivage »),
  distincte de verification (la preuve technique observée). Sémantique changelog : l'archive +
  outcome + release = le changelog de demain. Modifs : tasks.ts (type + parse), validate.ts
  (string|null), FIELD_ORDER dans taskWrites/task.mjs (placer outcome juste avant verification),
  done --outcome et update --outcome dans le CLI, champ éditable dans le TaskPanel du dashboard,
  documentation dans skills/roadmaped/references/formats.md et le SKILL.md (règle d'usage :
  consigner outcome à chaque done, comme verification). Rétrocompatible : les YAML existants sans le
  champ restent valides. Fini quand : npm run test passe, un done --outcome réel est relu dans le
  YAML sur disque, et le dashboard affiche/édite le champ.
