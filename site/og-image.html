<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  /* Source for og-image.png — render at exactly 1200×630 with headless Chrome. */
  * { margin: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    background: #0e0e0e;
    color: #ededed;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 84px 88px;
    display: flex; flex-direction: column; justify-content: space-between;
    position: relative; overflow: hidden;
  }
  /* faint accent stripe echoing the glyph */
  body::after {
    content: ""; position: absolute; right: -120px; top: -120px;
    width: 520px; height: 520px; border-radius: 50%;
    background: radial-gradient(circle, rgba(37,99,235,.22), transparent 68%);
  }
  .brand { display: flex; align-items: center; gap: 20px; z-index: 1; }
  .glyph { width: 56px; height: 56px; border-radius: 10px; }
  .name { font-size: 40px; font-weight: 600; letter-spacing: -.01em; }
  .headline {
    font-size: 74px; font-weight: 600; line-height: 1.04; letter-spacing: -.025em;
    max-width: 940px; z-index: 1;
  }
  .accent { color: #5b8bf5; }
  .row { display: flex; align-items: center; gap: 16px; z-index: 1; }
  .tag {
    font-size: 24px; color: #9a9a9a; font-weight: 500;
  }
  .dot { color: #2563eb; }
  .cli {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 22px; color: #ededed; background: #171717; border: 1px solid #2a2a2a;
    border-radius: 6px; padding: 8px 16px;
  }
</style>
</head>
<body>
  <div class="brand">
    <svg class="glyph" viewBox="0 0 16 16" aria-hidden="true"><rect width="16" height="16" fill="#171717"/><rect x="3" y="4" width="10" height="2" fill="#fafafa"/><rect x="3" y="7" width="7" height="2" fill="#3b82f6"/><rect x="3" y="10" width="10" height="2" fill="#fafafa"/></svg>
    <span class="name">Roadmapped</span>
  </div>

  <h1 class="headline">Your repo is already your <span class="accent">project management tool.</span></h1>

  <div class="row">
    <span class="tag">Flat YAML files <span class="dot">·</span> agent-first <span class="dot">·</span> no SaaS <span class="dot">·</span> MIT</span>
    <span class="cli">npx roadmapped init</span>
  </div>
</body>
</html>
