    <script>
      // Anti-flash thème (#269) : pose data-theme AVANT le premier paint (sans lui,
      // un rechargement en sombre flashe blanc). Inline + synchrone obligatoire.
      // Miroir exact de resolveTheme() dans src/state/theme.ts.
      (function () {
        var t = null
        try { t = localStorage.getItem('ui:theme') } catch (e) {}
        if (t !== 'dark' && t !== 'light')
          t = window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
        document.documentElement.dataset.theme = t
      })()
    </script>
